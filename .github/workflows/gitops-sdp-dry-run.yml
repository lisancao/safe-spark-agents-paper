name: gitops-sdp-dry-run

# PR GATE: run the REAL `spark-pipelines dry-run` structural gate on every changed
# SDP spec. This is the CI side of the GitOps loop -- it (not the agent) holds a
# Spark session. Per PREREGISTRATION.md the gate catches STRUCTURAL defects
# (D1 UNRESOLVED_COLUMN / D4 TABLE_OR_VIEW_NOT_FOUND / D5 CANNOT_MODIFY_CONFIG) and
# intentionally NOT semantic ones (D2/D3/D6/D7/D8/D9). A dry-run error fails the job.

on:
  pull_request:
    paths:
      - "study/gitops_demo/pipeline-definitions/**"
      - "study/gitops_demo/changed_pipelines.py"
      - ".github/workflows/gitops-sdp-dry-run.yml"

permissions:
  contents: read

env:
  GITOPS_DIR: study/gitops_demo
  CONNECT_PORT: "15055"

jobs:
  dry-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for the PR diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pyspark[connect] + pyyaml
        run: pip install "pyspark[connect]==4.1.2" pyyaml

      - name: Resolve SPARK_HOME from pyspark
        run: |
          SPARK_HOME="$(python -c 'import os, pyspark; print(os.path.dirname(pyspark.__file__))')"
          echo "SPARK_HOME=${SPARK_HOME}" >> "$GITHUB_ENV"
          echo "resolved SPARK_HOME=${SPARK_HOME}"

      - name: Start local Spark Connect server
        run: bash "${GITOPS_DIR}/local_spark_connect.sh" start

      - name: Ensure demo schema exists (spark_catalog.gitops_demo)
        env:
          SPARK_REMOTE: sc://localhost:15055
        run: python3 "${GITOPS_DIR}/ensure_schema.py"

      - name: Run the dry-run gate on each changed spec
        env:
          SPARK_REMOTE: sc://localhost:15055
          BASE_REF: ${{ github.event.pull_request.base.sha }}
          HEAD_REF: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          mapfile -t SPECS < <(python3 "${GITOPS_DIR}/changed_pipelines.py" --base "${BASE_REF}" --head "${HEAD_REF}")
          if [ "${#SPECS[@]}" -eq 0 ]; then
            echo "No changed SDP specs under pipeline-definitions/; nothing to gate."
            exit 0
          fi
          echo "Gating ${#SPECS[@]} spec(s):"
          printf '  %s\n' "${SPECS[@]}"
          rc=0
          for spec in "${SPECS[@]}"; do
            echo "::group::dry-run ${spec}"
            if python3 "${SPARK_HOME}/pipelines/cli.py" dry-run --spec "${spec}"; then
              echo "GATE PASS: ${spec}"
            else
              echo "GATE FAIL: ${spec}"
              rc=1
            fi
            echo "::endgroup::"
          done
          exit "${rc}"

      - name: Stop local Spark Connect server
        if: always()
        run: bash "${GITOPS_DIR}/local_spark_connect.sh" stop
