# Unity Catalog (OSS) wiring for the durable Spark Connect server — FLEET (service-principal) scope.
#
# Append these to the Connect SERVER's spark-defaults.conf (server-side, NOT the thin client config
# in deploy/spark-omnigent/conf/). The server holds ONE Unity Catalog service-principal token for
# the whole fleet; per-agent isolation is by schema convention (sandbox_<principal>), and per-user
# identity is enforced at the Connect layer by the mTLS proxy + PrincipalPinningInterceptor.
#
# Pin Unity Catalog OSS >= 0.5.0. CVE-2026-27478 affects UC OSS < 0.4.1 — do not deploy below that.

# --- Catalog plugin (Unity Catalog OSS REST catalog) ---------------------------------------------
spark.sql.catalog.unity                org.apache.spark.sql.connector.catalog.unity.UCSingleCatalog
spark.sql.catalog.unity.uri            __UC_URI__         # e.g. http://uc-host:8080
spark.sql.catalog.unity.token          __UC_FLEET_TOKEN__ # SINGLE service-principal token (fleet scope)
spark.sql.defaultCatalog               unity

# --- Spark Connect server: pre-shared bearer + identity-pinning interceptor ----------------------
# The PSK the Envoy auth proxy injects as `authorization: Bearer <PSK>` (see ../README.md).
spark.connect.authenticate.token       __CONNECT_PSK__
# Verifies the Envoy-injected x-connect-principal and pins user_id to it (kills user_id spoofing).
spark.connect.grpc.interceptor.classes com.safesparkagents.connect.auth.PrincipalPinningInterceptor
