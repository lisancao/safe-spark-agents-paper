# Spark Connect server — server-side defaults.
#
# Loaded via SPARK_CONF_DIR (start-connect-server.sh sets it to this directory by default; the
# systemd unit sets it explicitly). Runtime knobs (gRPC port, warehouse dir, driver memory,
# jars, auth token) are passed by start-connect-server.sh on the command line and OVERRIDE the
# values here — keep this file for the durable, non-per-launch defaults.
#
# Apache Spark 4.1.1 + JDK 17. Hardening keys are from Spark's config/Connect.scala.

# --- catalog / warehouse --------------------------------------------------------------------
spark.sql.catalogImplementation        hive
# Default warehouse; the launcher overrides this with --warehouse-dir (default /srv/spark/warehouse).
spark.sql.warehouse.dir                file:///srv/spark/warehouse

# --- jars -----------------------------------------------------------------------------------
# The Kafka connector jars are bundled in <repo>/jars and passed by the launcher via --jars
# (absolute paths differ per install, so they are NOT hard-coded here). To pin them in this
# file instead, uncomment and edit to your absolute paths:
# spark.jars  /opt/safe-spark-agents/jars/commons-pool2-2.12.0.jar,/opt/safe-spark-agents/jars/kafka-clients-3.9.0.jar,/opt/safe-spark-agents/jars/spark-sql-kafka-0-10_2.13-4.1.0.jar,/opt/safe-spark-agents/jars/spark-token-provider-kafka-0-10_2.13-4.1.0.jar

# --- Connect hardening (config/Connect.scala) -----------------------------------------------
# Reap idle sessions so abandoned clients don't pin driver memory forever (default is 60m).
spark.connect.session.manager.defaultSessionTimeout     30m
# Reap orphaned executions whose client detached without a reattach (default is 5m).
spark.connect.execute.manager.detachedTimeout           5m
# Cap inbound gRPC message size to bound memory from a single oversized request (128 MiB).
spark.connect.grpc.maxInboundMessageSize                134217728
# Cap the serialized logical-plan size a client may submit (128 MiB) — bounds plan-bomb risk.
spark.connect.maxPlanSize                               134217728

# --- authentication (SECURITY: OFF by default) ----------------------------------------------
# spark.connect.authenticate.token is a single pre-shared bearer token checked on every gRPC
# call. It is coarse, server-wide auth — NOT per-user authorization. Real per-user auth is a
# separate authenticating-proxy task (see README). Leave it unset here; enable it for a quick
# shared secret by exporting SPARK_CONNECT_AUTHENTICATE_TOKEN before launch (the launcher then
# passes it via --conf). Setting it here in cleartext is discouraged.
# spark.connect.authenticate.token  <pre-shared-secret>
