# Iceberg-on-HMS-on-S3 catalog wiring for the loader / streaming consumer.
#
# Placeholders (__LIKE_THIS__) are substituted at deploy time — e.g.
#   sed -e "s|__CATALOG__|lakehouse|g" \
#       -e "s|__HMS_URI__|thrift://hive-metastore:9083|g" \
#       -e "s|__WAREHOUSE__|s3://my-bucket/warehouse|g" \
#       spark-defaults.iceberg.template.conf > spark-defaults.conf
#
# This is an ALTERNATIVE to passing the same values via spark_catalog.build_spark
# (--bucket/--catalog/...). If you render this file and point SPARK_CONF_DIR at
# it, the loaders pick the catalog up from here and the CLI flags become optional.
# Equivalent dict lives in load/spark_catalog.py::iceberg_conf.

spark.sql.extensions                              org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions

spark.sql.catalog.__CATALOG__                     org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.__CATALOG__.type                hive
spark.sql.catalog.__CATALOG__.uri                 __HMS_URI__
spark.sql.catalog.__CATALOG__.warehouse           __WAREHOUSE__
spark.sql.catalog.__CATALOG__.io-impl             org.apache.iceberg.aws.s3.S3FileIO

# S3 auth is IRSA: S3FileIO uses the AWS SDK v2 default chain (picks up the
# projected web-identity token automatically). s3a is only used for s3:// source
# reads and is pointed at the same web-identity provider for parity.
spark.hadoop.fs.s3a.aws.credentials.provider      software.amazon.awssdk.auth.credentials.WebIdentityTokenFileCredentialsProvider
