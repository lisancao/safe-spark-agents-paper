# =============================================================================================
# Envoy mTLS front proxy for the Spark Connect server — KUBERNETES SIDECAR variant.
# =============================================================================================
# This is the k8s adaptation of deploy/auth/envoy/envoy.yaml (PR #3, AUTH). It is NOT a vendored
# copy: it preserves PR #3's security contract verbatim and changes ONLY what the pod model
# requires. Diff vs the host/systemd original:
#   • admin moved OFF TCP onto a unix-domain socket (task contract §2: "admin off TCP")
#   • cert paths point at the Secret mount /etc/envoy/certs/ (was /etc/envoy/certs/ on the host
#     too, but here the files come from the `spark-connect-envoy-certs` k8s Secret, not the AMI)
#   • the upstream is the same-POD loopback 127.0.0.1:15002 (was the same-INSTANCE loopback)
# Everything else — SANITIZE of client XFCC, the Lua principal derivation, the mTLS validation
# against the Connect CA, the URI-SAN trust-domain pin, the injected PSK bearer, the h2c upstream
# — is byte-for-byte the PR #3 behaviour.
#
# Role: terminate client mTLS on the service port, VERIFY the client cert against the
# Connect-layer CA, derive a NON-SPOOFABLE principal from the cert, and forward the gRPC stream
# to the local Spark Connect server with two injected, trusted headers:
#   (a) authorization: Bearer <PSK>   -> the server's spark.connect.authenticate.token
#   (b) x-connect-principal: <id>     -> the verified client-cert identity (URI SAN last segment,
#                                        CN fallback). The PrincipalPinningInterceptor baked in the
#                                        PR #6 image pins the Spark Connect user_id to this header
#                                        and rejects the request if user_id != principal.
#
# Listener  : 0.0.0.0:15009  (the mTLS service port; the internal NLB TCP-passes through to here)
# Upstream  : 127.0.0.1:15002 (the local Spark Connect server, gRPC/h2c, loopback ONLY)
#
# Rendering: __CONNECT_PSK__ is the only placeholder. An initContainer substitutes the PSK from
# the `spark-connect-psk` Secret into a Memory-backed copy at pod start (see deployment.yaml).
# The PSK is therefore never baked into this file or the image — it matches the same Secret the
# Connect server reads as CONNECT_AUTH_TOKEN, so the two ends of the loopback hop always agree.
#
# Validate (placeholder is a syntactically valid string, so this passes pre-render):
#   envoy --mode validate -c deploy/eks/connect/base/envoy/envoy.yaml
# =============================================================================================

# Admin is OFF TCP: bound to a unix socket on a writable Memory emptyDir. /ready and /stats stay
# reachable in-container (e.g. `curl --unix-socket`) but NOTHING is exposed on a TCP port, so the
# admin endpoint can never be reached from the network. Liveness/readiness use the listener port.
admin:
  address:
    pipe:
      path: /var/run/envoy/admin.sock

static_resources:
  listeners:
    - name: connect_mtls_listener
      address:
        socket_address: { address: 0.0.0.0, port_value: 15009 }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: connect_auth
                codec_type: HTTP2          # gRPC clients speak h2
                # Strip any client-supplied XFCC; we set identity ourselves from the verified cert.
                forward_client_cert_details: SANITIZE
                route_config:
                  name: local_route
                  virtual_hosts:
                    - name: spark_connect
                      domains: ["*"]
                      routes:
                        - match: { prefix: "/" }
                          route:
                            cluster: spark_connect_local
                            # gRPC streams (ExecutePlan) are long-lived: disable route timeout.
                            timeout: 0s
                            max_stream_duration:
                              grpc_timeout_header_max: 0s
                          # (a) inject the server's pre-shared bearer token, non-overridable.
                          request_headers_to_add:
                            - header:
                                key: "authorization"
                                value: "Bearer __CONNECT_PSK__"
                              append_action: OVERWRITE_IF_EXISTS_OR_ADD
                http_filters:
                  # ---------------------------------------------------------------------------
                  # Derive the trusted principal from the verified client certificate. Runs BEFORE
                  # the router. It first REMOVES any client-supplied x-connect-principal (so the
                  # client cannot forge it), then sets it from the cert: prefer the first URI SAN's
                  # last path segment (spiffe://safe-spark-agents/agent_42 -> agent_42), falling
                  # back to the subject CN. No client cert => 403 (defence in depth;
                  # require_client_certificate already enforces this at the TLS layer).
                  # ---------------------------------------------------------------------------
                  - name: envoy.filters.http.lua
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
                      default_source_code:
                        inline_string: |
                          function envoy_on_request(handle)
                            -- Non-overridable: drop any client-supplied copy first.
                            handle:headers():remove("x-connect-principal")

                            local ssl = handle:streamInfo():downstreamSslConnection()
                            if ssl == nil then
                              handle:respond(
                                {[":status"] = "403"},
                                "client certificate required\n")
                              return
                            end

                            local principal = nil

                            -- Prefer URI SAN (e.g. SPIFFE id); take the last path segment.
                            local uris = ssl:uriSanPeerCertificate()
                            if uris ~= nil and #uris > 0 and uris[1] ~= nil and #uris[1] > 0 then
                              local uri = uris[1]
                              principal = string.match(uri, "([^/]+)$") or uri
                            end

                            -- Fallback: parse CN out of the subject DN.
                            if principal == nil or #principal == 0 then
                              local subject = ssl:subjectPeerCertificate()
                              if subject ~= nil then
                                principal = string.match(subject, "CN=([^,/]+)")
                              end
                            end

                            if principal == nil or #principal == 0 then
                              handle:respond(
                                {[":status"] = "403"},
                                "could not derive principal from client certificate\n")
                              return
                            end

                            handle:headers():add("x-connect-principal", principal)
                          end
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
          # -----------------------------------------------------------------------------------
          # Downstream TLS: terminate TLS and REQUIRE a client certificate signed by the Connect
          # CA. transport_socket lives on the filter_chain (not the listener).
          # -----------------------------------------------------------------------------------
          transport_socket:
            name: envoy.transport_sockets.tls
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.DownstreamTlsContext
              require_client_certificate: true
              common_tls_context:
                alpn_protocols: ["h2"]
                tls_params:
                  tls_minimum_protocol_version: TLSv1_2
                tls_certificates:
                  # From the `spark-connect-envoy-certs` Secret, mounted read-only at /etc/envoy/certs.
                  - certificate_chain: { filename: "/etc/envoy/certs/server.crt" }
                    private_key: { filename: "/etc/envoy/certs/server.key" }
                validation_context:
                  # The Connect-layer CA (SEPARATE from the Client VPN CA — see PR #3 / PR #5).
                  trusted_ca: { filename: "/etc/envoy/certs/connect-ca.crt" }
                  # Hardening: only accept client certs whose URI SAN is in our trust domain. This
                  # bounds the blast radius of a misissued cert under the same CA and guarantees the
                  # Lua filter always finds a URI SAN (so the CN fallback is a defensive no-op).
                  # Keep this prefix in sync with TRUST_DOMAIN in deploy/auth/certs/vars.sh (PR #3).
                  match_typed_subject_alt_names:
                    - san_type: URI
                      matcher: { prefix: "spiffe://safe-spark-agents/" }

  clusters:
    - name: spark_connect_local
      type: STRICT_DNS
      connect_timeout: 5s
      # gRPC upstream over cleartext HTTP/2 on loopback (the server has no native TLS; the loopback
      # hop never leaves the pod's network namespace). The PSK bearer is the server-side auth here.
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http2_protocol_options: {}
      load_assignment:
        cluster_name: spark_connect_local
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address: { address: 127.0.0.1, port_value: 15002 }
