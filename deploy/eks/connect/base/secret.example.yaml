# EXAMPLE ONLY — DO NOT COMMIT A REAL VERSION OF THIS FILE.
# =============================================================================================
# The two Secrets this stack consumes. They are intentionally NOT listed in any kustomization.yaml,
# so `kustomize build` never emits a placeholder credential. Create the real Secrets out-of-band.
# Prefer External Secrets Operator / the Secrets Store CSI driver so AWS-side rotation flows
# through. If you create them by hand, pass sensitive values via --from-file (NEVER --from-literal:
# a literal puts the secret on the process argv and in shell history).
#
# 1) spark-connect-psk — the pre-shared key for the Envoy<->Connect loopback hop. The SAME token
#    is read by Envoy (injected as the `authorization: Bearer` header) and by the Connect server
#    (spark.connect.authenticate.token, via CONNECT_AUTH_TOKEN). Must be a single line, base64url
#    or hex (no '|' — it is the render step's sed delimiter). Generate + create:
#
#      openssl rand -base64 36 | tr '+/' '-_' | tr -d '=\n' > psk.token
#      kubectl -n spark create secret generic spark-connect-psk --from-file=token=psk.token
#      shred -u psk.token
#
# 2) spark-connect-envoy-certs — the Connect-layer server cert/key (presented to clients) and the
#    Connect-layer CA (used to VERIFY client certs). Issued by the PR #3 tooling
#    (deploy/auth/certs/: make-ca.sh, issue-server-cert.sh). This CA is SEPARATE from PR #5's
#    Client-VPN CA. The server cert's SAN must cover the name clients use for the NLB. Create:
#
#      # after deploy/auth/certs/issue-all.sh has produced server.crt/server.key/connect-ca.crt
#      kubectl -n spark create secret generic spark-connect-envoy-certs \
#        --from-file=server.crt=server.crt \
#        --from-file=server.key=server.key \
#        --from-file=connect-ca.crt=connect-ca.crt
#
# The stanzas below are the SHAPE only (stringData with placeholders), for reference/validation.
# =============================================================================================
apiVersion: v1
kind: Secret
metadata:
  name: spark-connect-psk
  labels:
    app.kubernetes.io/name: spark-connect
    app.kubernetes.io/component: connect-server
    app.kubernetes.io/part-of: reference-lakehouse
type: Opaque
stringData:
  token: "REPLACE-with-a-base64url-or-hex-PSK-single-line-no-pipe-char"
---
apiVersion: v1
kind: Secret
metadata:
  name: spark-connect-envoy-certs
  labels:
    app.kubernetes.io/name: spark-connect
    app.kubernetes.io/component: connect-server
    app.kubernetes.io/part-of: reference-lakehouse
type: Opaque
stringData:
  server.crt: |
    -----BEGIN CERTIFICATE-----
    REPLACE-with-the-Connect-layer-server-cert-from-deploy/auth/certs
    -----END CERTIFICATE-----
  server.key: |
    -----BEGIN PRIVATE KEY-----
    REPLACE-with-the-matching-server-private-key
    -----END PRIVATE KEY-----
  connect-ca.crt: |
    -----BEGIN CERTIFICATE-----
    REPLACE-with-the-Connect-layer-CA-cert-used-to-verify-client-certs
    -----END CERTIFICATE-----
