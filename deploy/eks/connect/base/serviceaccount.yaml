# The Spark ServiceAccount — used by the Connect-server/driver pod AND every executor pod.
# ---------------------------------------------------------------------------------------------
# Two jobs, one SA:
#   1. RBAC subject: the driver authenticates to the k8s API as this SA to create/watch/delete
#      executor pods (see rbac.yaml). spark.kubernetes.authenticate.driver.serviceAccountName
#      resolves to this name (the PR #6 image's spark-defaults sets it from SPARK_SERVICE_ACCOUNT,
#      default `spark`).
#   2. IRSA principal: the eks.amazonaws.com/role-arn annotation is the entire IRSA binding. The
#      EKS pod-identity webhook sees it and injects a projected web-identity token plus
#      AWS_ROLE_ARN / AWS_WEB_IDENTITY_TOKEN_FILE into every pod using this SA. hadoop-aws'
#      WebIdentityTokenFileCredentialsProvider (set in the image's spark-defaults) exchanges that
#      token for short-lived S3 creds — driver AND executors get warehouse RW with NO static keys.
#
# The IAM role + its trust policy are OWNED BY eks-cluster-iac (PR #5): the role
# `${name_prefix}-irsa-spark` trusts this cluster's OIDC provider for
# system:serviceaccount:<spark_namespace>:<spark_service_account> and grants S3 RW on the
# warehouse bucket. We only REFERENCE its ARN here. The placeholder is replaced per-environment by
# the overlay (overlays/example/kustomization.yaml) from the PR #5 output `irsa_spark.role_arn`.
#
# CRITICAL: the overlay namespace AND this SA name MUST equal the terraform `spark_namespace` /
# `spark_service_account` (defaults: spark / spark) or the IRSA OIDC `sub` condition won't match
# and the token exchange will be denied.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: spark
  labels:
    app.kubernetes.io/name: spark-connect
    app.kubernetes.io/component: spark
    app.kubernetes.io/part-of: reference-lakehouse
  annotations:
    # <-- from eks-cluster-iac output `irsa_spark.role_arn`
    eks.amazonaws.com/role-arn: arn:aws:iam::000000000000:role/REPLACE-ssa-spark-irsa-spark
