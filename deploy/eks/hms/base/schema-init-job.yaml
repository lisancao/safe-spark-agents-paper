# One-shot, idempotent schema initialization.
#
# Owns the metastore schema so the serving Deployment never has to (the Deployment runs with
# IS_RESUME=true and schema.verification=true — it only ever reads/validates the schema).
#
# Idempotency: `schematool -initSchema` fails if the schema already exists, so we guard it with
# `schematool -info`. First run -> -info fails -> we run the literal `-initSchema -dbType postgres`.
# Re-runs (Job re-applied, Argo/Helm sync, retries) -> -info succeeds -> we no-op. Verified safe
# to run repeatedly against apache/hive:4.0.1 + Postgres 16. (Hive 4 also offers the atomic
# `-initOrUpgradeSchema`; the guard form is used here to honor the literal init contract while
# staying re-runnable AND to keep a version upgrade an explicit, reviewed action.)
apiVersion: batch/v1
kind: Job
metadata:
  name: hive-metastore-schema-init
  labels:
    app.kubernetes.io/name: hive-metastore
    app.kubernetes.io/component: schema-init
    app.kubernetes.io/part-of: reference-lakehouse
spec:
  backoffLimit: 6
  # Reap the Job 1h after it finishes; re-applying the manifest recreates it.
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: hive-metastore
        app.kubernetes.io/component: schema-init
    spec:
      restartPolicy: OnFailure
      serviceAccountName: hive-metastore
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: schematool
          image: hive-metastore-pg:4.0.1 # overridden per-env by the overlay (newName/newTag)
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              # Render hive-site.xml so schematool reads the DB connection from a file
              # (no password on argv).
              bash /hms-conf/render-hive-site.sh /hms-conf/hive-site.xml.tmpl
              if "${HIVE_HOME}"/bin/schematool -dbType postgres -info >/dev/null 2>&1; then
                echo "[init] metastore schema already present — nothing to do (idempotent)."
              else
                echo "[init] no schema found — running: schematool -initSchema -dbType postgres"
                "${HIVE_HOME}"/bin/schematool -dbType postgres -initSchema --verbose
                echo "[init] schema initialized."
              fi
          envFrom:
            - secretRef:
                name: hive-metastore-db
          env:
            - name: HMS_WAREHOUSE_DIR
              valueFrom:
                configMapKeyRef: { name: hive-metastore-env, key: HMS_WAREHOUSE_DIR }
            - name: HMS_S3A_REGION
              valueFrom:
                configMapKeyRef: { name: hive-metastore-env, key: HMS_S3A_REGION }
          volumeMounts:
            - name: hive-conf-tmpl
              mountPath: /hms-conf
              readOnly: true
          resources:
            requests: { cpu: "100m", memory: "512Mi" }
            limits: { memory: "1Gi" }
      volumes:
        - name: hive-conf-tmpl
          configMap:
            name: hive-metastore-site
            items:
              - key: hive-site.xml.tmpl
                path: hive-site.xml.tmpl
              - key: render-hive-site.sh
                path: render-hive-site.sh
