# EXAMPLE ONLY — DO NOT COMMIT A REAL VERSION OF THIS FILE.
#
# This is the shape of the Secret the metastore + init Job consume. It is intentionally NOT
# listed in any kustomization.yaml, so `kustomize build` never emits a placeholder credential.
# Create the real Secret out-of-band. In production prefer NOT to hand-create it: drive it from
# AWS Secrets Manager via the External Secrets Operator or the Secrets Store CSI driver, so RDS
# rotation flows through. If you do create it by hand, pass the password via --from-file (or
# stdin), NEVER --from-literal — a literal puts the real password on the process argv and in
# shell history. See README.md ("Secret wiring") for the exact command. HMS_DB_DRIVER is not
# sensitive but lives here so all four JDO connection params have a single source of truth.
apiVersion: v1
kind: Secret
metadata:
  name: hive-metastore-db
  labels:
    app.kubernetes.io/name: hive-metastore
    app.kubernetes.io/component: metastore
    app.kubernetes.io/part-of: reference-lakehouse
type: Opaque
stringData:
  HMS_DB_URL: "jdbc:postgresql://REPLACE-rds-endpoint:5432/metastore"
  HMS_DB_USER: "hive"
  HMS_DB_PASSWORD: "REPLACE-ME"
  HMS_DB_DRIVER: "org.postgresql.Driver"
