# ServiceAccount for the Hive Metastore, wired for IRSA (IAM Roles for Service Accounts).
#
# The eks.amazonaws.com/role-arn annotation is the entire IRSA binding: the EKS-injected
# pod-identity webhook sees this annotation and mounts a projected web-identity token plus
# the AWS_ROLE_ARN / AWS_WEB_IDENTITY_TOKEN_FILE env vars into every pod that uses this SA.
# hadoop-aws' WebIdentityTokenCredentialsProvider then exchanges that token for short-lived
# S3 credentials — no static access keys anywhere.
#
# The role ARN itself is OWNED BY the eks-cluster-iac task (it provisions the IAM role and its
# trust policy: trusts this cluster's OIDC provider for system:serviceaccount:<ns>:hive-metastore,
# and grants s3:* on the warehouse bucket). We only REFERENCE it here. The placeholder below is
# replaced per-environment by the overlay (see overlays/example/kustomization.yaml).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hive-metastore
  labels:
    app.kubernetes.io/name: hive-metastore
    app.kubernetes.io/component: metastore
    app.kubernetes.io/part-of: reference-lakehouse
  annotations:
    # <-- from eks-cluster-iac output `hms_irsa_role_arn`
    eks.amazonaws.com/role-arn: arn:aws:iam::000000000000:role/REPLACE-hms-irsa-role
