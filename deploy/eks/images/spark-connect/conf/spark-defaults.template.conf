# ─────────────────────────────────────────────────────────────────────────────
# Spark Connect server defaults — Iceberg over Hive Metastore, S3A via IRSA.
#
# This is a TEMPLATE. entrypoint.sh renders __PLACEHOLDERS__ from environment at
# pod start and writes the result to $SPARK_CONF_DIR/spark-defaults.conf. Secrets
# (the Connect PSK) are injected at runtime from a k8s Secret — NEVER baked here.
#
# Both roles use this file: the Connect server Deployment (driver) and the
# executor pods Spark launches on k8s read the same baked image + conf.
# ─────────────────────────────────────────────────────────────────────────────

# ── Session catalog: in-memory (NO Hive) ────────────────────────────────────
# The Iceberg catalog below is a JDBC catalog (its own RDS Postgres DB), so the
# table path no longer depends on the Hive Metastore thrift service at all. We
# therefore set the default Spark session catalog to in-memory rather than hive,
# so plain (non-iceberg) SQL never reaches out to HMS. HMS may still be deployed
# (harmless); nothing here talks to it. This deliberately removes the Hive
# 2.3.10-client vs Hive-4.0.1-server thrift mismatch (get_table vs get_table_req)
# that blocked Iceberg TABLE ops over HMS.
spark.sql.catalogImplementation            in-memory

# ── Iceberg SQL extensions (MERGE / row-level ops / changelog / CALL procs) ──
spark.sql.extensions                       org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions

# ── Named Iceberg catalog: JDBC catalog (RDS Postgres) + S3 warehouse ───────
# Tables live as `__ICEBERG_CATALOG__.<db>.<table>`. The JDBC catalog stores the
# Iceberg metadata pointers in a Postgres DB (Iceberg auto-creates its own
# catalog tables on first use); the actual table metadata + data files live in
# the S3 warehouse, written through S3FileIO (AWS SDK v2, IRSA — same identity as
# the rest of the stack, no static keys). The Postgres JDBC driver and the AWS
# SDK v2 bundle are both baked in the image. Credentials are injected at runtime
# from a k8s Secret (rendered here by entrypoint.sh) — NEVER baked in the image.
spark.sql.catalog.__ICEBERG_CATALOG__              org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.__ICEBERG_CATALOG__.type         jdbc
spark.sql.catalog.__ICEBERG_CATALOG__.uri          __ICEBERG_JDBC_URL__
spark.sql.catalog.__ICEBERG_CATALOG__.jdbc.user    __ICEBERG_JDBC_USER__
spark.sql.catalog.__ICEBERG_CATALOG__.jdbc.password __ICEBERG_JDBC_PASSWORD__
spark.sql.catalog.__ICEBERG_CATALOG__.warehouse    __WAREHOUSE__
spark.sql.catalog.__ICEBERG_CATALOG__.io-impl      org.apache.iceberg.aws.s3.S3FileIO
spark.sql.defaultCatalog                   __ICEBERG_CATALOG__

# ── S3A via IRSA (EKS web-identity; NO static keys, ever) ───────────────────
# The IRSA admission webhook injects AWS_ROLE_ARN + AWS_WEB_IDENTITY_TOKEN_FILE
# into every pod that uses the annotated ServiceAccount; the provider below reads
# them and exchanges the projected token for short-lived role credentials.
spark.hadoop.fs.s3a.impl                                   org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.aws.credentials.provider              software.amazon.awssdk.auth.credentials.WebIdentityTokenFileCredentialsProvider
spark.hadoop.fs.s3a.path.style.access                     false
spark.hadoop.fs.s3a.connection.maximum                    200

# ── Spark Connect gRPC auth: per-request PSK + auth interceptor ─────────────
# The interceptor jar is built from deploy/auth/interceptor (PR #3) and baked at
# build time. Its FQCN must match the class that PR ships. The PSK token is read
# from a mounted k8s Secret at runtime and injected here by entrypoint.sh.
spark.connect.grpc.interceptor.classes     __INTERCEPTOR_CLASSES__
spark.connect.authenticate.token           __CONNECT_AUTH_TOKEN__

# ── Kubernetes runtime (same image for driver + executors) ──────────────────
# spark.master / spark.kubernetes.* are supplied by the Deployment launch command
# (see README) so the image stays cluster-agnostic. The executor image is THIS
# image — set spark.kubernetes.container.image to the pushed tag at launch.
spark.kubernetes.authenticate.driver.serviceAccountName    __SPARK_SERVICE_ACCOUNT__
