# Mock OIDC IdP (static discovery + JWKS) and OpenFGA authorization backend.
# The IdP only publishes /.well-known/openid-configuration + /jwks.json so Lakekeeper can verify
# hand-minted RS256 bearer JWTs (see mint_tokens.py). Deploy this BEFORE lakekeeper-authz:
# OIDC discovery is a hard startup gate in Lakekeeper v0.13.1.
apiVersion: apps/v1
kind: Deployment
metadata: { name: idp-authz, namespace: spark, labels: { app: idp-authz } }
spec:
  replicas: 1
  selector: { matchLabels: { app: idp-authz } }
  template:
    metadata: { labels: { app: idp-authz } }
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports: [{ containerPort: 80 }]
          volumeMounts:
            - { name: files, mountPath: /usr/share/nginx/html/.well-known/openid-configuration, subPath: openid-configuration }
            - { name: files, mountPath: /usr/share/nginx/html/jwks.json, subPath: jwks.json }
      volumes:
        - { name: files, configMap: { name: idp-authz-files } }   # created from mint_tokens.py output
---
apiVersion: v1
kind: Service
metadata: { name: idp-authz, namespace: spark }
spec:
  selector: { app: idp-authz }
  ports: [{ port: 80, targetPort: 80 }]
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: openfga, namespace: spark, labels: { app: openfga } }
spec:
  replicas: 1
  selector: { matchLabels: { app: openfga } }
  template:
    metadata: { labels: { app: openfga } }
    spec:
      containers:
        - name: openfga
          image: openfga/openfga:v1.14.0
          args: ["run"]
          env:
            - { name: OPENFGA_DATASTORE_ENGINE, value: memory }   # demo; use postgres + a migrate Job to persist
            - { name: OPENFGA_AUTHN_METHOD, value: none }
            - { name: OPENFGA_HTTP_TLS_ENABLED, value: "false" }
            - { name: OPENFGA_PLAYGROUND_ENABLED, value: "false" }
          ports:
            - { name: grpc, containerPort: 8081 }
            - { name: http, containerPort: 8080 }
          readinessProbe: { httpGet: { path: /healthz, port: 8080 }, initialDelaySeconds: 3, periodSeconds: 5 }
---
apiVersion: v1
kind: Service
metadata: { name: openfga, namespace: spark }
spec:
  selector: { app: openfga }
  ports:
    - { name: grpc, port: 8081, targetPort: 8081 }
    - { name: http, port: 8080, targetPort: 8080 }
