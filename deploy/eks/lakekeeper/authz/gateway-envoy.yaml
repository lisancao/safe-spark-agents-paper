# Per-principal routing gateway: terminate client mTLS, derive the principal from the cert URI-SAN,
# and route each principal to ITS OWN tenant Connect server. A tenant_a cert can reach ONLY
# spark-connect-tenant-a; there is no route that sends it to tenant_b. Unrouted principal => 403.
# __CONNECT_PSK__ is rendered from the spark-connect-psk Secret at pod start (same PSK the tenant
# servers require as CONNECT_AUTH_TOKEN).
admin:
  address: { pipe: { path: /var/run/envoy/admin.sock } }
static_resources:
  listeners:
    - name: gw_mtls
      address: { socket_address: { address: 0.0.0.0, port_value: 15009 } }
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: gw
                codec_type: HTTP2
                forward_client_cert_details: SANITIZE
                access_log:
                  - name: envoy.access_loggers.stdout
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                      log_format:
                        text_format_source:
                          inline_string: "GWLOG principal=%REQ(X-CONNECT-PRINCIPAL)% cluster=%UPSTREAM_CLUSTER% code=%RESPONSE_CODE%\n"
                route_config:
                  name: by_principal
                  virtual_hosts:
                    - name: tenants
                      domains: ["*"]
                      routes:
                        - match:
                            prefix: "/"
                            headers: [{ name: "x-connect-principal", string_match: { exact: "tenant_a" } }]
                          route: { cluster: connect_tenant_a, timeout: 0s, max_stream_duration: { grpc_timeout_header_max: 0s } }
                          request_headers_to_add:
                            - header: { key: "authorization", value: "Bearer __CONNECT_PSK__" }
                              append_action: OVERWRITE_IF_EXISTS_OR_ADD
                          response_headers_to_add:
                            - header: { key: "x-routed-to", value: "spark-connect-tenant-a" }
                        - match:
                            prefix: "/"
                            headers: [{ name: "x-connect-principal", string_match: { exact: "tenant_b" } }]
                          route: { cluster: connect_tenant_b, timeout: 0s, max_stream_duration: { grpc_timeout_header_max: 0s } }
                          request_headers_to_add:
                            - header: { key: "authorization", value: "Bearer __CONNECT_PSK__" }
                              append_action: OVERWRITE_IF_EXISTS_OR_ADD
                          response_headers_to_add:
                            - header: { key: "x-routed-to", value: "spark-connect-tenant-b" }
                        - match: { prefix: "/" }
                          direct_response:
                            status: 403
                            body: { inline_string: "no tenant route for this principal\n" }
                          response_headers_to_add:
                            - header: { key: "x-routed-to", value: "DENIED" }
                http_filters:
                  - name: envoy.filters.http.lua
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
                      default_source_code:
                        inline_string: |
                          function envoy_on_request(handle)
                            handle:headers():remove("x-connect-principal")
                            local ssl = handle:streamInfo():downstreamSslConnection()
                            if ssl == nil then
                              handle:respond({[":status"]="403"}, "client certificate required\n"); return
                            end
                            local principal = nil
                            local uris = ssl:uriSanPeerCertificate()
                            if uris ~= nil and #uris > 0 and uris[1] ~= nil and #uris[1] > 0 then
                              principal = string.match(uris[1], "([^/]+)$") or uris[1]
                            end
                            if principal == nil or #principal == 0 then
                              handle:respond({[":status"]="403"}, "could not derive principal\n"); return
                            end
                            handle:headers():add("x-connect-principal", principal)
                            handle:clearRouteCache()
                          end
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
          transport_socket:
            name: envoy.transport_sockets.tls
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.DownstreamTlsContext
              require_client_certificate: true
              common_tls_context:
                alpn_protocols: ["h2"]
                tls_params: { tls_minimum_protocol_version: TLSv1_2 }
                tls_certificates:
                  - certificate_chain: { filename: "/etc/envoy/certs/server.crt" }
                    private_key: { filename: "/etc/envoy/certs/server.key" }
                validation_context:
                  trusted_ca: { filename: "/etc/envoy/certs/connect-ca.crt" }
                  match_typed_subject_alt_names:
                    - san_type: URI
                      matcher: { prefix: "spiffe://safe-spark-agents/" }
  clusters:
    - name: connect_tenant_a
      type: STRICT_DNS
      connect_timeout: 5s
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config: { http2_protocol_options: {} }
      load_assignment:
        cluster_name: connect_tenant_a
        endpoints:
          - lb_endpoints:
              - endpoint: { address: { socket_address: { address: spark-connect-tenant-a.spark.svc.cluster.local, port_value: 15002 } } }
    - name: connect_tenant_b
      type: STRICT_DNS
      connect_timeout: 5s
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config: { http2_protocol_options: {} }
      load_assignment:
        cluster_name: connect_tenant_b
        endpoints:
          - lb_endpoints:
              - endpoint: { address: { socket_address: { address: spark-connect-tenant-b.spark.svc.cluster.local, port_value: 15002 } } }
