# =============================================================================================
# Spark Connect driver defaults — LOCAL config-shakeout smoke (docker-compose).
# Mounted read-only into the spark-connect container at /opt/spark/conf/spark-defaults.conf.
#
# What this file proves (and what it deliberately omits):
#   * TWO Iceberg REST catalogs, lk_a and lk_b, each pinned to ONE Lakekeeper warehouse
#     (tenant_a / tenant_b). "Acting as tenant A" == using catalog lk_a.
#   * Credential vending is turned on per catalog via the REST access-delegation header
#     (X-Iceberg-Access-Delegation: vended-credentials). The catalog server (Lakekeeper) mints a
#     short-lived, prefix-scoped credential and returns it in the loadTable response.
#   * io-impl = S3FileIO — the Iceberg-native S3 client. This is the path that carries the vended
#     credential from the driver's loadTable response into the serialized scan/write tasks that
#     run on the SEPARATE executor JVM (spark-worker). (The Hadoop S3AFileSystem path is NOT used.)
#
#   * There is NO static S3 credential anywhere in this file: no s3.access-key-id /
#     s3.secret-access-key, no spark.hadoop.fs.s3a.access.key, no endpoint. The endpoint and the
#     credential both arrive from the vend. Consequently, in the LOCAL stack the vended credential
#     is the SOLE way an executor can reach MinIO — a successful executor write therefore proves
#     the vended credential reached the executor. (On EKS an ambient IRSA role also exists; see
#     eks/ and FINDINGS.md for why the EKS run is the load-bearing proof.)
# =============================================================================================

# ── Spark standalone: a REAL separate executor (not local[*] in the driver JVM) ──────────────
spark.master                                   spark://spark-master:7077
spark.driver.host                              spark-connect
spark.driver.bindAddress                       0.0.0.0
# Exactly one executor with one core -> deterministic, and unmistakably a separate process.
spark.executor.cores                           1
spark.cores.max                                1
spark.executor.memory                          1g
spark.sql.shuffle.partitions                   1

# ── Iceberg SQL extensions ───────────────────────────────────────────────────────────────────
spark.sql.extensions                           org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions

# ── Catalog lk_a  ->  Lakekeeper warehouse "tenant_a"  (vended, prefix-scoped to tenant_a/) ──
spark.sql.catalog.lk_a                                       org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.lk_a.type                                 rest
spark.sql.catalog.lk_a.uri                                  http://lakekeeper:8181/catalog
spark.sql.catalog.lk_a.warehouse                            tenant_a
spark.sql.catalog.lk_a.header.X-Iceberg-Access-Delegation   vended-credentials
spark.sql.catalog.lk_a.io-impl                              org.apache.iceberg.aws.s3.S3FileIO

# ── Catalog lk_b  ->  Lakekeeper warehouse "tenant_b"  (vended, prefix-scoped to tenant_b/) ──
spark.sql.catalog.lk_b                                       org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.lk_b.type                                 rest
spark.sql.catalog.lk_b.uri                                  http://lakekeeper:8181/catalog
spark.sql.catalog.lk_b.warehouse                            tenant_b
spark.sql.catalog.lk_b.header.X-Iceberg-Access-Delegation   vended-credentials
spark.sql.catalog.lk_b.io-impl                              org.apache.iceberg.aws.s3.S3FileIO
