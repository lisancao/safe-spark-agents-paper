# Egress mTLS sidecar for the spark-omnigent sandbox (Option A).
# Rendered at start by sidecar/entrypoint.sh (placeholders __NAME__ are runtime-injected).
#
# Flow:  pyspark-client --(plaintext h2c, loopback)--> THIS Envoy --(mTLS, ALPN h2)--> remote NLB/Envoy
# The remote on-box Envoy (deploy/auth, PR #3) verifies the client cert, derives the principal from
# its URI SAN (spiffe://safe-spark-agents/<principal>), sets x-connect-principal, and injects the PSK.
# This sidecar's only job is to PRESENT the per-principal client cert and validate the server CA.
#
# Why a listener on loopback only: the agent (thin-client) container shares this netns
# (compose network_mode: "service:egress") and reaches us at 127.0.0.1:__LISTEN_PORT__, but the
# client cert/key are mounted ONLY into THIS container, so the agent process cannot read them.

admin:
  # NO TCP admin: the sandbox shares this netns, so a TCP admin on 127.0.0.1 would be reachable by
  # the untrusted agent (DoS / config & secret inspection via /config_dump, /quitquitquit, etc.).
  # Bind admin to a UNIX SOCKET in THIS container's filesystem instead. Sharing the network namespace
  # does NOT share the mount namespace, so the sandbox container cannot open this path. The compose
  # healthcheck still reaches /ready via `curl --unix-socket` from inside the sidecar.
  address:
    pipe: { path: /tmp/envoy-admin.sock }

static_resources:
  listeners:
  - name: connect_loopback
    address:
      socket_address: { address: 127.0.0.1, port_value: __LISTEN_PORT__ }
    filter_chains:
    - filters:
      - name: envoy.filters.network.http_connection_manager
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
          stat_prefix: connect_egress
          # pyspark gRPC uses cleartext HTTP/2 (prior knowledge) on the loopback hop.
          codec_type: HTTP2
          route_config:
            name: local_route
            virtual_hosts:
            - name: connect
              domains: ["*"]
              routes:
              - match: { prefix: "/" }
                route:
                  cluster: connect_remote
                  # gRPC streams are long-lived; do not impose an HTTP route timeout.
                  timeout: 0s
          http_filters:
          - name: envoy.filters.http.router
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
  - name: connect_remote
    type: STRICT_DNS
    connect_timeout: 10s
    # Speak HTTP/2 to the remote (gRPC).
    typed_extension_protocol_options:
      envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
        "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
        explicit_http_config:
          http2_protocol_options: {}
    load_assignment:
      cluster_name: connect_remote
      endpoints:
      - lb_endpoints:
        - endpoint:
            address:
              socket_address: { address: __REMOTE_HOST__, port_value: __REMOTE_PORT__ }
    transport_socket:
      name: envoy.transport_sockets.tls
      typed_config:
        "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
        # SNI presented to the remote NLB/Envoy (defaults to the remote host).
        sni: __SNI_HOST__
        common_tls_context:
          # Must offer h2 so the remote routes this as gRPC over HTTP/2.
          alpn_protocols: [ h2 ]
          # ---- The per-principal CLIENT certificate (this is the whole point) ----
          tls_certificates:
          - certificate_chain: { filename: __CLIENT_CERT__ }
            private_key:        { filename: __CLIENT_KEY__ }
          # ---- Verify the remote server against our trusted CA ----
          # NOTE: when REMOTE_SAN is set, sidecar/entrypoint.sh APPENDS a
          # `match_typed_subject_alt_names` block here to also pin the SERVER identity (defence in
          # depth) once the server cert SAN is known on the deploy/connect-server side.
          validation_context:
            trusted_ca: { filename: __CA_CERT__ }
