<svg width="100%" viewBox="0 0 680 190" role="img" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
<title>Section 2 — the control boundary and agent-native dev loop</title>
<desc>The agent authors inert desired-state in an untrusted zone; a governed control plane validates it at a structural dry-run gate and a reconciler submits plans to execution. Authoring never crosses into execution — only structural feedback returns to the agent.</desc>
<style>
  text{font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  .th{font-size:14px;font-weight:500;fill:#16201e}.ts{font-size:12px;fill:#5c6b66}
  .arr{stroke:#93a29d;stroke-width:1.5;fill:none}
  .c-gray rect{fill:#F1EFE8;stroke:#5F5E5A;stroke-width:.75}.c-gray .th{fill:#2C2C2A}.c-gray .ts{fill:#5F5E5A}
  .c-blue rect{fill:#E6F1FB;stroke:#185FA5;stroke-width:.75}.c-blue .th{fill:#0C447C}.c-blue .ts{fill:#185FA5}
  .c-teal rect{fill:#E1F5EE;stroke:#0F6E56;stroke-width:.75}.c-teal .th{fill:#085041}.c-teal .ts{fill:#0F6E56}
  .c-green rect{fill:#EAF3DE;stroke:#3B6D11;stroke-width:.75}.c-green .th{fill:#27500A}.c-green .ts{fill:#3B6D11}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<text x="42" y="24" class="ts">Zone U — authoring</text>
<text x="282" y="24" class="ts">Zone C — governed control</text>
<text x="548" y="24" class="ts">Zone D — execution</text>

<rect x="34" y="38" width="214" height="132" rx="10" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="4 4" opacity="0.55"/>
<rect x="262" y="38" width="262" height="132" rx="10" fill="none" stroke="#378ADD" stroke-width="1" stroke-dasharray="4 4" opacity="0.6"/>
<rect x="536" y="38" width="110" height="132" rx="10" fill="none" stroke="#1D9E75" stroke-width="1" stroke-dasharray="4 4" opacity="0.6"/>

<!-- control boundary -->
<line x1="255" y1="46" x2="255" y2="172" stroke="#16201e" stroke-width="2.5"/>

<!-- feedback loop -->
<path d="M330 84 V66 H141 V84" fill="none" stroke="#93a29d" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
<text x="236" y="60" class="ts" text-anchor="middle">structural defects → feedback</text>

<g class="c-gray"><rect x="48" y="84" width="186" height="60" rx="6"/><text x="141" y="110" class="th" text-anchor="middle">AI agent</text><text x="141" y="128" class="ts" text-anchor="middle">authors inert spec</text></g>
<g class="c-green"><rect x="272" y="84" width="116" height="60" rx="6"/><text x="330" y="110" class="th" text-anchor="middle">Dry-run gate</text><text x="330" y="128" class="ts" text-anchor="middle">before any data</text></g>
<g class="c-blue"><rect x="402" y="84" width="112" height="60" rx="6"/><text x="458" y="110" class="th" text-anchor="middle">Reconciler</text><text x="458" y="128" class="ts" text-anchor="middle">submits plans</text></g>
<g class="c-teal"><rect x="548" y="84" width="92" height="60" rx="6"/><text x="594" y="110" class="th" text-anchor="middle">Execute</text><text x="594" y="128" class="ts" text-anchor="middle">driver + exec</text></g>

<line x1="234" y1="114" x2="272" y2="114" class="arr" marker-end="url(#arrow)"/>
<line x1="388" y1="114" x2="402" y2="114" class="arr" marker-end="url(#arrow)"/>
<line x1="514" y1="114" x2="548" y2="114" class="arr" marker-end="url(#arrow)"/>

<text x="141" y="162" class="ts" text-anchor="middle">never executes · I1</text>
<text x="330" y="162" class="ts" text-anchor="middle">gate before data · I4</text>
<text x="458" y="162" class="ts" text-anchor="middle">holds creds · I2/I5</text>
<text x="594" y="162" class="ts" text-anchor="middle">off-host · I3</text>
</svg>
