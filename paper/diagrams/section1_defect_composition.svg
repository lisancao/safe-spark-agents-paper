<svg width="100%" viewBox="0 0 680 300" role="img" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
<title>Section 4.1.1: silent-defect composition by class, arm A vs arm B</title>
<desc>Silent semantic defects shipped, per class, comparing bare imperative (A) and SDP (B). D6 nondeterministic dedup is the largest class and is tied, 38 versus 39, a wash. D7 timezone and day-bucket is SDP-specific, imperative ships zero and SDP ships seven, and it closes to zero once the skill teaches the idiom. D8 silent row-drop is B worse by six, 51 versus 57. D2 timestamp misparse is negligible, 1 versus 3. The whole A minus B gap is D7 plus D8; the largest class, D6, is tied.</desc>
<style>
  text{font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  .th{font-size:13px;font-weight:500;fill:#16201e}.ts{font-size:11px;fill:#5c6b66}
  .lab{font-size:11px;font-weight:600;fill:#5c6b66;letter-spacing:.03em}
  .a rect{fill:#DCD8CC;stroke:#8a8a82;stroke-width:.75}
  .b rect{fill:#A9D9C9;stroke:#0F6E56;stroke-width:.75}
  .av{font-size:11px;font-weight:600;fill:#6b6a63}.bv{font-size:11px;font-weight:600;fill:#0F6E56}
</style>

<!-- legend -->
<rect x="150" y="14" width="13" height="10" rx="2" fill="#DCD8CC" stroke="#8a8a82" stroke-width=".75"/>
<text x="169" y="23" class="ts">A (bare imperative) ships</text>
<rect x="320" y="14" width="13" height="10" rx="2" fill="#A9D9C9" stroke="#0F6E56" stroke-width=".75"/>
<text x="339" y="23" class="ts">B (SDP) ships</text>

<!-- D6: tied -->
<text x="40" y="66" class="th">D6 dedup</text>
<g class="a"><rect x="150" y="44" width="228" height="13" rx="2"/></g><text x="384" y="55" class="av">38</text>
<g class="b"><rect x="150" y="64" width="234" height="13" rx="2"/></g><text x="390" y="75" class="bv">39</text>
<text x="640" y="62" class="ts" text-anchor="end">largest class, tied (a wash)</text>

<!-- D7: SDP-specific driver (highlighted) -->
<rect x="30" y="92" width="620" height="52" rx="6" fill="#EEF6F2" stroke="#0F6E56" stroke-width=".5" stroke-dasharray="3 3"/>
<text x="40" y="122" class="th">D7 timezone</text>
<g class="a"><rect x="150" y="100" width="2" height="13" rx="1"/></g><text x="158" y="111" class="av">0</text>
<g class="b"><rect x="150" y="120" width="42" height="13" rx="2"/></g><text x="198" y="131" class="bv">7</text>
<text x="640" y="118" class="ts" text-anchor="end" fill="#0F6E56">SDP-only, closes to 0 once taught</text>

<!-- D8: B worse by 6 -->
<text x="40" y="184" class="th">D8 row-drop</text>
<g class="a"><rect x="150" y="162" width="306" height="13" rx="2"/></g><text x="462" y="173" class="av">51</text>
<g class="b"><rect x="150" y="182" width="342" height="13" rx="2"/></g><text x="498" y="193" class="bv">57</text>
<text x="640" y="180" class="ts" text-anchor="end">B worse by +6</text>

<!-- D2: negligible -->
<text x="40" y="242" class="th">D2 timestamp</text>
<g class="a"><rect x="150" y="220" width="6" height="13" rx="2"/></g><text x="162" y="231" class="av">1</text>
<g class="b"><rect x="150" y="240" width="18" height="13" rx="2"/></g><text x="174" y="251" class="bv">3</text>
<text x="640" y="238" class="ts" text-anchor="end">negligible</text>

<text x="40" y="286" class="lab">THE WHOLE A−B GAP IS D7 (+7) AND D8 (+6) · THE LARGEST CLASS, D6, IS TIED</text>
</svg>
