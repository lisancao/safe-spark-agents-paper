<svg width="100%" viewBox="0 0 680 300" role="img" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
<title>Section 1: defect taxonomy and what a structural gate can catch</title>
<desc>Defects split into three families. Structural defects (D1, D4, D5) are caught at the dry-run gate before any data. Semantic defects (D2, D6, D7, D8) are un-gateable by construction and ship as silent defects in completed output. State defects (D3, D9) are not scored offline.</desc>
<style>
  text{font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  .th{font-size:14px;font-weight:500;fill:#16201e}.ts{font-size:12px;fill:#5c6b66}
  .arr{stroke:#93a29d;stroke-width:1.5;fill:none}
  .c-gray rect{fill:#F1EFE8;stroke:#5F5E5A;stroke-width:.75}.c-gray .th{fill:#2C2C2A}.c-gray .ts{fill:#5F5E5A}
  .c-green rect{fill:#EAF3DE;stroke:#3B6D11;stroke-width:.75}.c-green .th{fill:#27500A}.c-green .ts{fill:#3B6D11}
  .c-red rect{fill:#FCEBEB;stroke:#A32D2D;stroke-width:.75}.c-red .th{fill:#791F1F}.c-red .ts{fill:#A32D2D}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<text x="40" y="30" class="th">Defect taxonomy: what a structural gate can and cannot catch</text>

<!-- families (left) -->
<g class="c-green"><rect x="40" y="52" width="342" height="66" rx="6"/><text x="56" y="74" class="th">Structural</text><text x="56" y="94" class="ts">D1 unresolved column · D4 broken DAG</text><text x="56" y="110" class="ts">D5 immutable-config mutation</text></g>
<g class="c-red"><rect x="40" y="132" width="342" height="66" rx="6"/><text x="56" y="154" class="th">Semantic / silent</text><text x="56" y="174" class="ts">D2 timestamp · D6 dedup · D7 timezone</text><text x="56" y="190" class="ts">D8 silent row-drop</text></g>
<g class="c-gray"><rect x="40" y="212" width="342" height="56" rx="6"/><text x="56" y="234" class="th">State</text><text x="56" y="254" class="ts">D3 unwatermarked dedup · D9 unbounded state</text></g>

<!-- where caught (right) -->
<g class="c-green"><rect x="452" y="58" width="188" height="54" rx="6"/><text x="546" y="80" class="th" text-anchor="middle">Dry-run gate</text><text x="546" y="98" class="ts" text-anchor="middle">caught before data</text></g>
<g class="c-red"><rect x="452" y="138" width="188" height="54" rx="6"/><text x="546" y="160" class="th" text-anchor="middle">Ships in output</text><text x="546" y="178" class="ts" text-anchor="middle">= silent defect</text></g>
<g class="c-gray"><rect x="452" y="213" width="188" height="54" rx="6"/><text x="546" y="235" class="th" text-anchor="middle">Not scored offline</text><text x="546" y="253" class="ts" text-anchor="middle">out of scope</text></g>

<line x1="382" y1="85" x2="452" y2="85" class="arr" marker-end="url(#arrow)"/>
<line x1="382" y1="165" x2="452" y2="165" class="arr" marker-end="url(#arrow)"/>
<line x1="382" y1="240" x2="452" y2="240" class="arr" marker-end="url(#arrow)"/>
</svg>
