<svg width="100%" viewBox="0 0 680 240" role="img" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
<title>Section 1 — the study run-loop for one cell</title>
<desc>For each (task, arm, seed): generate seeded data, the agent proposes a pipeline, arm B passes a structural SDP dry-run gate before execution while arm A has no gate, execute on Spark, blind-grade against ground truth, and record cost. Failures feed back to the agent up to an iteration cap.</desc>
<style>
  text{font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  .th{font-size:14px;font-weight:500;fill:#16201e}.ts{font-size:12px;fill:#5c6b66}
  .arr{stroke:#93a29d;stroke-width:1.5;fill:none}
  .c-gray rect{fill:#F1EFE8;stroke:#5F5E5A;stroke-width:.75}.c-gray .th{fill:#2C2C2A}.c-gray .ts{fill:#5F5E5A}
  .c-blue rect{fill:#E6F1FB;stroke:#185FA5;stroke-width:.75}.c-blue .th{fill:#0C447C}.c-blue .ts{fill:#185FA5}
  .c-teal rect{fill:#E1F5EE;stroke:#0F6E56;stroke-width:.75}.c-teal .th{fill:#085041}.c-teal .ts{fill:#0F6E56}
  .c-green rect{fill:#EAF3DE;stroke:#3B6D11;stroke-width:.75}.c-green .th{fill:#27500A}.c-green .ts{fill:#3B6D11}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<!-- legend -->
<rect x="40" y="18" width="14" height="10" rx="2" fill="#FAEEDA" stroke="#BA7517" stroke-width=".75"/>
<text x="60" y="27" class="ts">arm A — imperative, no gate</text>
<rect x="300" y="18" width="14" height="10" rx="2" fill="#EAF3DE" stroke="#3B6D11" stroke-width=".75"/>
<text x="320" y="27" class="ts">arm B — SDP, dry-run gated</text>

<!-- arm A bypass -->
<path d="M214 120 V98 H450 V120" fill="none" stroke="#BA7517" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
<text x="332" y="92" class="ts" text-anchor="middle">arm A — no gate</text>

<!-- stages -->
<g class="c-gray"><rect x="40" y="120" width="112" height="60" rx="6"/><text x="96" y="146" class="th" text-anchor="middle">Generate data</text><text x="96" y="164" class="ts" text-anchor="middle">seeded, per cell</text></g>
<g class="c-gray"><rect x="158" y="120" width="112" height="60" rx="6"/><text x="214" y="146" class="th" text-anchor="middle">Agent proposes</text><text x="214" y="164" class="ts" text-anchor="middle">pipeline code</text></g>
<g class="c-green"><rect x="276" y="120" width="112" height="60" rx="6"/><text x="332" y="146" class="th" text-anchor="middle">SDP dry-run</text><text x="332" y="164" class="ts" text-anchor="middle">arm B · pre-data</text></g>
<g class="c-teal"><rect x="394" y="120" width="112" height="60" rx="6"/><text x="450" y="146" class="th" text-anchor="middle">Execute</text><text x="450" y="164" class="ts" text-anchor="middle">local / EKS</text></g>
<g class="c-blue"><rect x="512" y="120" width="112" height="60" rx="6"/><text x="568" y="146" class="th" text-anchor="middle">Grade</text><text x="568" y="164" class="ts" text-anchor="middle">blind · record</text></g>

<line x1="152" y1="150" x2="158" y2="150" class="arr" marker-end="url(#arrow)"/>
<line x1="270" y1="150" x2="276" y2="150" class="arr" marker-end="url(#arrow)"/>
<line x1="388" y1="150" x2="394" y2="150" class="arr" marker-end="url(#arrow)"/>
<line x1="506" y1="150" x2="512" y2="150" class="arr" marker-end="url(#arrow)"/>

<!-- feedback loop -->
<path d="M568 180 V206 H214 V180" fill="none" stroke="#93a29d" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
<text x="391" y="222" class="ts" text-anchor="middle">feedback · retry to iteration cap</text>
</svg>
