<svg width="100%" viewBox="0 0 680 300" role="img" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
<title>Section 4.2: where structural defects are caught, SDP's gate vs bare imperative</title>
<desc>Structural defects (D1, D4, D5) reach a boundary marked "before any data is processed." Bare imperative has no structural gate, so zero are caught before data; four surface later at runtime, after executors have run and compute is spent. SDP runs a framework dry-run at that boundary and catches 79 defects before any data is processed; thirty more surface at runtime, and neither arm ships a structural defect.</desc>
<style>
  text{font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  .th{font-size:13px;font-weight:500}.ts{font-size:11px}
  .lab{font-size:11px;font-weight:600;fill:#5c6b66;letter-spacing:.03em}
  .arr{stroke:#93a29d;stroke-width:1.5;fill:none}
  .thin{stroke:#b9c6c1;stroke-width:1.25;fill:none}
  .gray rect{fill:#F1EFE8;stroke:#5F5E5A;stroke-width:.75}.gray .th{fill:#2C2C2A}.gray .ts{fill:#5F5E5A}
  .teal rect{fill:#E1F5EE;stroke:#0F6E56;stroke-width:.75}.teal .th{fill:#085041}.teal .ts{fill:#0F6E56}
  .amber rect{fill:#FAEEDA;stroke:#BA7517;stroke-width:.75}.amber .th{fill:#633806}.amber .ts{fill:#8a5a0b}
  .big{font-size:30px;font-weight:600}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<text x="40" y="18" class="lab">WHERE STRUCTURAL DEFECTS (D1/D4/D5) ARE CAUGHT · THE LOAD-BEARING RESULT</text>

<!-- data boundary -->
<line x1="358" y1="40" x2="358" y2="266" stroke="#b9433a" stroke-width="1.25" stroke-dasharray="5 4"/>
<text x="352" y="52" class="ts" fill="#b9433a" text-anchor="end">◀ before any data</text>
<text x="364" y="52" class="ts" fill="#b9433a">after: executors run, compute spent ▶</text>
<text x="358" y="284" class="lab" fill="#b9433a" text-anchor="middle">the dry-run gate sits on this line</text>

<!-- Row A: imperative -->
<g class="gray"><rect x="40" y="76" width="150" height="46" rx="6"/><text x="115" y="99" class="th" text-anchor="middle">Imperative (bare)</text><text x="115" y="115" class="ts" text-anchor="middle">no structural gate</text></g>
<line x1="190" y1="99" x2="486" y2="99" class="arr" marker-end="url(#arrow)"/>
<circle cx="358" cy="99" r="24" fill="#ffffff" stroke="#b3b3ac" stroke-width="1.25" stroke-dasharray="3 3"/>
<text x="358" y="109" class="big" fill="#9a9a92" text-anchor="middle">0</text>
<text x="358" y="140" class="ts" fill="#8a8a82" text-anchor="middle">no gate exists, nothing caught early</text>
<g class="amber"><rect x="490" y="76" width="150" height="46" rx="6"/><text x="565" y="99" class="th" text-anchor="middle">Runtime, over data</text><text x="565" y="115" class="ts" text-anchor="middle">4 surface here · 0 shipped</text></g>

<!-- Row B: SDP -->
<g class="teal"><rect x="40" y="188" width="150" height="46" rx="6"/><text x="115" y="211" class="th" text-anchor="middle">SDP (declarative)</text><text x="115" y="227" class="ts" text-anchor="middle">framework dry-run</text></g>
<line x1="190" y1="211" x2="330" y2="211" class="arr" marker-end="url(#arrow)"/>
<circle cx="358" cy="207" r="24" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.25"/>
<text x="358" y="217" class="big" fill="#085041" text-anchor="middle">79</text>
<text x="358" y="248" class="ts" fill="#0F6E56" text-anchor="middle">caught before any data</text>
<line x1="384" y1="211" x2="486" y2="211" class="thin" marker-end="url(#arrow)"/>
<g class="teal"><rect x="490" y="188" width="150" height="46" rx="6"/><text x="565" y="211" class="th" text-anchor="middle">Runtime, over data</text><text x="565" y="227" class="ts" text-anchor="middle">30 surface here · 0 shipped</text></g>
</svg>
