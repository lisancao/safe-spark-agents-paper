<svg width="100%" viewBox="0 0 680 270" role="img" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
<title>Spark Connect dev-to-prod: promote by changing one URL</title>
<desc>The same agent, SDP spec, and dry-run gate develop against a local Spark Connect server and promote to the remote EKS cluster by changing a single endpoint URL (SPARK_REMOTE) — no code change. Local mode without a Connect server arrives in Spark 4.3.</desc>
<style>
  text{font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  .th{font-size:14px;font-weight:500;fill:#16201e}.ts{font-size:12px;fill:#5c6b66}
  .mono{font-size:12px;fill:#5c6b66;font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace}
  .arr{stroke:#93a29d;stroke-width:1.5;fill:none}
  .c-gray rect{fill:#F1EFE8;stroke:#5F5E5A;stroke-width:.75}.c-gray .th{fill:#2C2C2A}.c-gray .ts{fill:#5F5E5A}
  .c-blue rect{fill:#E6F1FB;stroke:#185FA5;stroke-width:.75}.c-blue .th{fill:#0C447C}.c-blue .ts{fill:#185FA5}
  .c-teal rect{fill:#E1F5EE;stroke:#0F6E56;stroke-width:.75}.c-teal .th{fill:#085041}.c-teal .ts{fill:#0F6E56}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<g class="c-gray"><rect x="270" y="30" width="140" height="48" rx="6"/><text x="340" y="50" class="th" text-anchor="middle">Agent + SDP spec</text><text x="340" y="68" class="ts" text-anchor="middle">one inert artifact</text></g>
<line x1="340" y1="78" x2="340" y2="98" class="arr" marker-end="url(#arrow)"/>

<g class="c-blue"><rect x="278" y="98" width="124" height="42" rx="6"/><text x="340" y="116" class="th" text-anchor="middle">SPARK_REMOTE</text><text x="340" y="132" class="ts" text-anchor="middle">change one URL</text></g>

<path d="M320 140 L180 156" class="arr" marker-end="url(#arrow)"/>
<path d="M360 140 L500 156" class="arr" marker-end="url(#arrow)"/>

<g class="c-teal"><rect x="55" y="156" width="235" height="56" rx="6"/><text x="172" y="180" class="th" text-anchor="middle">Local development</text><text x="172" y="199" class="mono" text-anchor="middle">sc://localhost:15002</text></g>
<g class="c-teal"><rect x="390" y="156" width="235" height="56" rx="6"/><text x="507" y="180" class="th" text-anchor="middle">Production (EKS)</text><text x="507" y="199" class="mono" text-anchor="middle">sc://&lt;cluster-nlb&gt;:15009</text></g>

<text x="340" y="238" class="ts" text-anchor="middle">Same agent, spec, and dry-run gate: develop locally, then promote to the cluster by changing the endpoint.</text>
<text x="340" y="255" class="ts" text-anchor="middle">(Local mode without a Connect server arrives in Spark 4.3.)</text>
</svg>
