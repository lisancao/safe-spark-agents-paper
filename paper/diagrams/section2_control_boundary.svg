<svg width="100%" viewBox="0 0 720 372" role="img" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
<title>The control boundary: the imperative agent crosses it, the SDP agent stops at it</title>
<desc>A single control boundary separates authoring from execution. The obvious, uncontained way: an imperative agent holds a live SparkSession and credentials and calls df.write.saveAsTable, so its authoring IS execution, the write crosses the boundary and touches data directly. The agent-native way: an SDP agent writes only @dp transforms, uses SparkSession.active() as a read-only handle, and produces an inert spec that stops at the boundary; absent from its surface are any owned session, credentials, endpoint, cluster config, or run lifecycle (invariants I1/I2). Only the platform crosses, carrying that spec across through the dry-run gate and the controller, so the same execution engine (driver and executor pods, the only things that touch data) runs it. Imperative authoring reaches execution by itself; SDP authoring reaches it only through the governed crossing.</desc>
<style>
  text{font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  .lab{font-size:10px;font-weight:600;letter-spacing:.03em}
  .th{font-size:12px;font-weight:600}.ts{font-size:10px}.tn{font-size:9px}
  .mono{font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;font-size:9px}
</style>
<defs>
<marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<marker id="arR" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#A32D2D" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<text x="16" y="17" class="lab" fill="#5F5E5A">THE CONTROL BOUNDARY: THE IMPERATIVE AGENT CROSSES IT, THE SDP AGENT STOPS AT IT</text>
<text x="16" y="40" class="lab" fill="#8a8f8c">AUTHORING · what the agent writes</text>
<text x="556" y="40" class="lab" fill="#8a8f8c">EXECUTION</text>

<!-- the boundary -->
<line x1="392" y1="48" x2="392" y2="352" stroke="#16201e" stroke-width="2.5"/>
<text x="386" y="200" class="lab" fill="#16201e" text-anchor="middle" transform="rotate(-90 386 200)">CONTROL BOUNDARY</text>

<!-- shared execution -->
<rect x="500" y="96" width="206" height="176" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.1"/>
<text x="603" y="150" class="th" text-anchor="middle" fill="#085041">EXECUTION</text>
<text x="603" y="169" class="ts" text-anchor="middle" fill="#0F6E56">driver + executor pods</text>
<text x="603" y="185" class="ts" text-anchor="middle" fill="#0F6E56">the only things that</text>
<text x="603" y="199" class="ts" text-anchor="middle" fill="#0F6E56">touch data</text>

<!-- ===== TOP: imperative crosses ===== -->
<text x="24" y="66" class="lab" fill="#854F0B">THE OBVIOUS WAY · imperative agent (uncontained)</text>
<rect x="24" y="74" width="232" height="66" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
<text x="140" y="93" class="th" text-anchor="middle" fill="#633806">Imperative agent</text>
<text x="140" y="108" class="tn" text-anchor="middle" fill="#854F0B">holds a live SparkSession + credentials</text>
<text x="140" y="126" class="mono" text-anchor="middle" fill="#791F1F">df.write.saveAsTable("gold")</text>
<!-- red crossing arrow -->
<line x1="256" y1="107" x2="498" y2="130" stroke="#A32D2D" stroke-width="2" marker-end="url(#arR)"/>
<text x="392" y="92" class="tn" fill="#A32D2D" text-anchor="middle">the write CROSSES the boundary:</text>
<text x="392" y="103" class="tn" fill="#A32D2D" text-anchor="middle">authoring IS execution, data touched</text>

<!-- ===== BOTTOM: SDP stops ===== -->
<text x="24" y="212" class="lab" fill="#0F6E56">AGENT-NATIVE · the SDP agent writes, and stops</text>
<rect x="24" y="220" width="214" height="66" rx="6" fill="#FDF3F2" stroke="#b9433a" stroke-width="1"/>
<text x="131" y="239" class="th" text-anchor="middle" fill="#b9433a">SDP agent (untrusted)</text>
<text x="131" y="254" class="tn" text-anchor="middle" fill="#a2483f">writes only @dp transforms</text>
<text x="131" y="272" class="mono" text-anchor="middle" fill="#5c6b66">SparkSession.active()  # read-only</text>
<line x1="238" y1="253" x2="260" y2="253" stroke="#8a8f8c" stroke-width="1.2" marker-end="url(#ar)"/>
<!-- inert spec stops at the boundary -->
<rect x="262" y="230" width="104" height="46" rx="5" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
<text x="314" y="248" class="th" text-anchor="middle" fill="#2C2C2A">inert spec</text>
<text x="314" y="263" class="tn" text-anchor="middle" fill="#5F5E5A">stops at the wall</text>
<line x1="374" y1="230" x2="374" y2="276" stroke="#b9433a" stroke-width="2"/>
<!-- governed crossing -->
<rect x="398" y="234" width="96" height="38" rx="6" fill="#EAF3DE" stroke="#3B6D11" stroke-width="1"/>
<text x="446" y="250" class="tn" text-anchor="middle" fill="#27500A">gate + controller</text>
<text x="446" y="263" class="tn" text-anchor="middle" fill="#3B6D11">the platform (§2.3)</text>
<line x1="366" y1="253" x2="396" y2="253" stroke="#3B6D11" stroke-width="1.4" stroke-dasharray="4 2" marker-end="url(#ar)"/>
<line x1="494" y1="248" x2="500" y2="234" stroke="#3B6D11" stroke-width="1.4" marker-end="url(#ar)"/>
<text x="392" y="292" class="tn" fill="#0F6E56" text-anchor="middle">only the platform crosses: the inert spec goes across via the gate and controller, never the agent</text>

<!-- absent-surface checklist -->
<rect x="24" y="304" width="342" height="48" rx="6" fill="#FbFaF7" stroke="#8a8f8c" stroke-width=".8" stroke-dasharray="4 3"/>
<text x="34" y="321" class="tn" fill="#5c6b66">Absent from the agent's surface (I1/I2):</text>
<text x="34" y="336" class="tn" fill="#16201e">no session owned · no credentials · no endpoint · no cluster</text>
<text x="34" y="348" class="tn" fill="#16201e">config · no run / lifecycle</text>
</svg>
