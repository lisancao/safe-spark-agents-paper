<svg width="100%" viewBox="0 0 680 290" role="img" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
<title>The agent-native dev loop vs the normal imperative loop</title>
<desc>Two loops. The imperative loop finds errors by running the code: write, run spark-submit, execute over data, discover a runtime error, and only then retry — after data is touched and compute is spent. The agent-native loop catches errors before running: propose desired-state, a dry-run gate rejects structural defects before any data, then reconcile and execute; the retry happens at the gate, with no data touched.</desc>
<style>
  text{font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  .th{font-size:14px;font-weight:500;fill:#16201e}.ts{font-size:12px;fill:#5c6b66}
  .lbl{font-size:12.5px;font-weight:500}
  .arr{stroke:#93a29d;stroke-width:1.5;fill:none}
  .c-amber rect{fill:#FAEEDA;stroke:#BA7517;stroke-width:.75}.c-amber .th{fill:#633806}.c-amber .ts{fill:#854F0B}
  .c-red rect{fill:#FCEBEB;stroke:#A32D2D;stroke-width:.75}.c-red .th{fill:#791F1F}.c-red .ts{fill:#A32D2D}
  .c-green rect{fill:#EAF3DE;stroke:#3B6D11;stroke-width:.75}.c-green .th{fill:#27500A}.c-green .ts{fill:#3B6D11}
  .c-teal rect{fill:#E1F5EE;stroke:#0F6E56;stroke-width:.75}.c-teal .th{fill:#085041}.c-teal .ts{fill:#0F6E56}
  .c-gray rect{fill:#F1EFE8;stroke:#5F5E5A;stroke-width:.75}.c-gray .th{fill:#2C2C2A}.c-gray .ts{fill:#5F5E5A}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<!-- BEFORE: imperative loop -->
<text x="40" y="22" class="lbl" fill="#854F0B">Imperative loop — the error is found by running it</text>
<g class="c-amber"><rect x="40" y="40" width="105" height="50" rx="6"/><text x="92" y="62" class="th" text-anchor="middle">Write code</text><text x="92" y="79" class="ts" text-anchor="middle">owns session</text></g>
<g class="c-amber"><rect x="165" y="40" width="105" height="50" rx="6"/><text x="217" y="62" class="th" text-anchor="middle">Run it</text><text x="217" y="79" class="ts" text-anchor="middle">spark-submit</text></g>
<g class="c-amber"><rect x="290" y="40" width="105" height="50" rx="6"/><text x="342" y="62" class="th" text-anchor="middle">Execute</text><text x="342" y="79" class="ts" text-anchor="middle">over the data</text></g>
<g class="c-red"><rect x="415" y="40" width="150" height="50" rx="6"/><text x="490" y="62" class="th" text-anchor="middle">Runtime error</text><text x="490" y="79" class="ts" text-anchor="middle">— or wrong data</text></g>
<line x1="145" y1="65" x2="165" y2="65" class="arr" marker-end="url(#arrow)"/>
<line x1="270" y1="65" x2="290" y2="65" class="arr" marker-end="url(#arrow)"/>
<line x1="395" y1="65" x2="415" y2="65" class="arr" marker-end="url(#arrow)"/>
<path d="M490 90 V110 H92 V90" fill="none" stroke="#BA7517" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
<text x="291" y="124" class="ts" text-anchor="middle">retry — after the data is touched and compute is spent</text>

<!-- AFTER: agent-native loop -->
<text x="40" y="162" class="lbl" fill="#0F6E56">Agent-native loop — the error is caught before running it</text>
<g class="c-gray"><rect x="40" y="178" width="115" height="50" rx="6"/><text x="97" y="200" class="th" text-anchor="middle">Propose</text><text x="97" y="217" class="ts" text-anchor="middle">desired-state</text></g>
<g class="c-green"><rect x="175" y="178" width="125" height="50" rx="6"/><text x="237" y="200" class="th" text-anchor="middle">Dry-run gate</text><text x="237" y="217" class="ts" text-anchor="middle">before any data</text></g>
<g class="c-teal"><rect x="320" y="178" width="115" height="50" rx="6"/><text x="377" y="200" class="th" text-anchor="middle">Reconcile</text><text x="377" y="217" class="ts" text-anchor="middle">&amp; execute</text></g>
<g class="c-teal"><rect x="455" y="178" width="90" height="50" rx="6"/><text x="500" y="206" class="th" text-anchor="middle">Data</text></g>
<line x1="155" y1="203" x2="175" y2="203" class="arr" marker-end="url(#arrow)"/>
<line x1="300" y1="203" x2="320" y2="203" class="arr" marker-end="url(#arrow)"/>
<line x1="435" y1="203" x2="455" y2="203" class="arr" marker-end="url(#arrow)"/>
<path d="M237 228 V248 H97 V228" fill="none" stroke="#3B6D11" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
<text x="167" y="262" class="ts" text-anchor="middle">retry — no data touched, ≈0 compute</text>
</svg>
