<svg width="100%" viewBox="0 0 720 470" role="img" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
<title>The agent-native dev loop: author, open a PR, gate on CI, reconcile over Connect</title>
<desc>An untrusted agent authors an inert SDP spec (no session, credentials, or config) and its only action is to open a pull request. On CI the pull request is gated by spark-pipelines dry-run, which validates the dataflow graph without touching data: a valid spec reports Run is COMPLETED, a broken one fails with TABLE_OR_VIEW_NOT_FOUND and feeds back to the agent. Only on merge does a controller, never the agent, run spark-pipelines run over Spark Connect, which ships plans over mTLS to a cluster of driver and executor pods that materialize tables to the governed catalog and S3 using the controller's credential. The same loop runs against a local Connect server for development or the remote cluster for production by changing SPARK_REMOTE.</desc>
<style>
  text{font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  .th{font-size:12px;font-weight:600}.ts{font-size:10px}.tn{font-size:9px}
  .lab{font-size:10px;font-weight:600;letter-spacing:.04em}
  .mono{font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;font-size:8.5px}
</style>
<defs>
<marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<text x="16" y="16" class="lab" fill="#5F5E5A">THE AGENT-NATIVE DEV LOOP: author, open a PR, structural gate on CI, reconcile over Connect</text>

<!-- Untrusted author zone -->
<text x="16" y="42" class="lab" fill="#b9433a">UNTRUSTED AUTHOR</text>
<rect x="16" y="50" width="176" height="50" rx="6" fill="#FDF3F2" stroke="#b9433a" stroke-width="1"/>
<text x="104" y="71" class="th" text-anchor="middle" fill="#b9433a">Agent</text>
<text x="104" y="88" class="tn" text-anchor="middle" fill="#a2483f">no session, no creds, no config</text>
<line x1="104" y1="100" x2="104" y2="122" stroke="#b9433a" stroke-width="1.2" marker-end="url(#ar)"/>
<text x="110" y="115" class="tn" fill="#a2483f">writes</text>
<rect x="16" y="124" width="176" height="50" rx="6" fill="#FDF3F2" stroke="#b9433a" stroke-width="1"/>
<text x="104" y="145" class="th" text-anchor="middle" fill="#b9433a">SDP spec</text>
<text x="104" y="162" class="tn" text-anchor="middle" fill="#a2483f">inert @dp transforms (pipeline.py)</text>
<line x1="104" y1="174" x2="104" y2="196" stroke="#b9433a" stroke-width="1.2" marker-end="url(#ar)"/>
<text x="110" y="189" class="tn" fill="#a2483f">opens</text>
<rect x="16" y="198" width="176" height="50" rx="6" fill="#FDF3F2" stroke="#b9433a" stroke-width="1"/>
<text x="104" y="219" class="th" text-anchor="middle" fill="#b9433a">Pull request</text>
<text x="104" y="236" class="tn" text-anchor="middle" fill="#a2483f">the only interface in</text>

<!-- boundary -->
<line x1="212" y1="48" x2="212" y2="448" stroke="#b9433a" stroke-width="1.3" stroke-dasharray="6 4"/>
<text x="206" y="130" class="tn" fill="#b9433a" text-anchor="middle" transform="rotate(-90 206 130)">control boundary</text>

<!-- Governed platform zone -->
<text x="236" y="42" class="lab" fill="#085041">GOVERNED PLATFORM</text>

<line x1="192" y1="223" x2="248" y2="223" stroke="#8a8f8c" stroke-width="1.2" marker-end="url(#ar)"/>
<rect x="250" y="182" width="300" height="82" rx="6" fill="#fff" stroke="#0b7a63" stroke-width="1"/>
<text x="400" y="201" class="th" text-anchor="middle" fill="#085041">CI gate</text>
<text x="400" y="217" class="mono" text-anchor="middle" fill="#5c6b66">spark-pipelines dry-run --spec orders/spark-pipeline.yml</text>
<text x="400" y="233" class="tn" text-anchor="middle" fill="#5c6b66">builds + validates the dataflow graph; touches no data</text>
<text x="400" y="248" class="tn" text-anchor="middle" fill="#0b7a63">valid: Run is COMPLETED</text>
<text x="400" y="260" class="tn" text-anchor="middle" fill="#b9433a">broken: TABLE_OR_VIEW_NOT_FOUND</text>

<!-- feedback to agent -->
<line x1="248" y1="255" x2="196" y2="255" stroke="#b9433a" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#ar)"/>
<text x="222" y="276" class="tn" fill="#b9433a" text-anchor="middle">feedback, no data touched</text>

<line x1="400" y1="264" x2="400" y2="300" stroke="#8a8f8c" stroke-width="1.2" marker-end="url(#ar)"/>
<text x="408" y="284" class="tn" fill="#5c6b66">on merge</text>

<rect x="250" y="302" width="216" height="60" rx="6" fill="#F2F1FB" stroke="#3C3489" stroke-width="1"/>
<text x="358" y="322" class="th" text-anchor="middle" fill="#3C3489">Controller (never the agent)</text>
<text x="358" y="338" class="mono" text-anchor="middle" fill="#5c6b66">spark-pipelines run --spec</text>
<text x="358" y="352" class="tn" text-anchor="middle" fill="#5c6b66">runs it as a Connect client, ships plans not code</text>

<line x1="466" y1="332" x2="490" y2="332" stroke="#8a8f8c" stroke-width="1.2" marker-end="url(#ar)"/>
<rect x="492" y="304" width="92" height="56" rx="6" fill="#fff" stroke="#0b7a63" stroke-width="1"/>
<text x="538" y="326" class="th" text-anchor="middle" fill="#085041">Connect</text>
<text x="538" y="343" class="tn" text-anchor="middle" fill="#5c6b66">plans, mTLS</text>

<line x1="584" y1="332" x2="608" y2="332" stroke="#8a8f8c" stroke-width="1.2" marker-end="url(#ar)"/>
<rect x="610" y="304" width="96" height="56" rx="6" fill="#fff" stroke="#0b7a63" stroke-width="1"/>
<text x="658" y="326" class="th" text-anchor="middle" fill="#085041">Cluster</text>
<text x="658" y="343" class="tn" text-anchor="middle" fill="#5c6b66">driver + exec pods</text>

<line x1="658" y1="360" x2="658" y2="392" stroke="#8a8f8c" stroke-width="1.2" marker-end="url(#ar)"/>
<rect x="360" y="394" width="346" height="42" rx="6" fill="#ECF5F1" stroke="#0b7a63" stroke-width="1"/>
<text x="533" y="411" class="ts" text-anchor="middle" fill="#085041">materialized tables: governed catalog + S3</text>
<text x="533" y="425" class="tn" text-anchor="middle" fill="#5c6b66">read with the controller's credential, never the agent's</text>

<text x="16" y="460" class="tn" fill="#8a5a0b">Same loop, two endpoints: a local Connect server (dev) or the remote cluster (prod), by changing SPARK_REMOTE. No code change.</text>
</svg>
