<svg width="100%" viewBox="0 0 720 468" role="img" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
<title>Connect on Kubernetes: one governed mTLS door, elastic executor pods on a separate node pool behind it</title>
<desc>A Connect client (the controller or an agent) reaches the cluster only through a single external mutual-TLS endpoint on port 15009. That endpoint is an Envoy sidecar inside the Spark Connect driver pod, which pins the caller's principal and forwards over loopback to the Connect server on 127.0.0.1:15002; the raw Connect port is never externally reachable. The driver pod is a singleton (replicas 1) and runs on the untainted system node pool alongside system addons. It is the Spark client-mode driver (spark.master points at the in-cluster Kubernetes API, deployMode client) and, through an RBAC service account allowed to create, watch, and delete pods in its own namespace, it spawns executor pods on a separate tainted executor node pool (taint spark-role=executor NoSchedule, label workload=spark-executor), scaling from zero to ten by dynamic allocation with two cores and two gigabytes each. Executors read the S3 Iceberg warehouse using vended, prefix-scoped credentials from Section 3.3. One shared Connect driver serves many sessions and execution scales elastically on the separate pool, behind the governed door and never around it.</desc>
<style>
  text{font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  .lab{font-size:10px;font-weight:600;letter-spacing:.03em}
  .th{font-size:11.5px;font-weight:600}.ts{font-size:10px}.tn{font-size:9px}
  .mono{font-family:ui-monospace,"SF Mono",Menlo,Consolas,monospace;font-size:8.5px}
</style>
