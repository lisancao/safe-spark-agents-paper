<text x="212" y="58" class="lab" fill="#8a5a0b">SYSTEM NODE POOL · untainted (driver, HMS, addons)</text>

<!-- driver pod -->
<rect x="212" y="68" width="272" height="176" rx="8" fill="#fff" stroke="#0b7a63" stroke-width="1.1"/>
<text x="348" y="86" class="th" text-anchor="middle" fill="#085041">Spark Connect driver pod (replicas: 1)</text>
<rect x="224" y="96" width="112" height="58" rx="5" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
<text x="280" y="114" class="th" text-anchor="middle" fill="#0C447C">Envoy mTLS</text>
<text x="280" y="129" class="tn" text-anchor="middle" fill="#185FA5">:15009 · 0.0.0.0</text>
<text x="280" y="143" class="tn" text-anchor="middle" fill="#185FA5">pins principal</text>
<rect x="360" y="96" width="112" height="58" rx="5" fill="#ECF5F1" stroke="#0b7a63" stroke-width="1"/>
<text x="416" y="114" class="th" text-anchor="middle" fill="#085041">Connect server</text>
<text x="416" y="129" class="mono" text-anchor="middle" fill="#5c6b66">127.0.0.1:15002</text>
<text x="416" y="143" class="tn" text-anchor="middle" fill="#5c6b66">loopback only</text>
<line x1="336" y1="125" x2="360" y2="125" stroke="#8a8f8c" stroke-width="1.2" marker-end="url(#ar)"/>
<text x="348" y="118" class="tn" fill="#5c6b66" text-anchor="middle">loopback</text>
<text x="224" y="176" class="mono" fill="#5c6b66">client-mode driver: spark.master=k8s://…default.svc</text>
<text x="224" y="190" class="tn" fill="#5c6b66">deployMode=client · driver.host=$(POD_IP) :7078/:7079</text>
<text x="224" y="206" class="tn" fill="#5c6b66">RBAC: driver SA may create / watch / delete pods (own ns)</text>
<text x="224" y="226" class="tn" fill="#8a5a0b">only :15009 is external; raw :15002 is unreachable except via Envoy</text>

<!-- mTLS arrow lands on Envoy -->
<line x1="196" y1="179" x2="224" y2="140" stroke="#185FA5" stroke-width="1.6" marker-end="url(#ar)"/>

<!-- driver -> k8s API -->
<line x1="348" y1="244" x2="348" y2="272" stroke="#8a8f8c" stroke-width="1.2" marker-end="url(#ar)"/>
<rect x="250" y="274" width="196" height="34" rx="6" fill="#F1EFE8" stroke="#5F5E5A" stroke-width=".9"/>
<text x="348" y="290" class="ts" text-anchor="middle" fill="#2C2C2A">kube API · kubernetes.default.svc</text>
<text x="348" y="303" class="tn" text-anchor="middle" fill="#5F5E5A">the driver schedules its own executor pods</text>

<!-- EXECUTOR node pool -->
<rect x="510" y="40" width="196" height="316" rx="10" fill="#F3F6F4" stroke="#0F6E56" stroke-width="1" stroke-dasharray="6 4"/>
<text x="522" y="58" class="lab" fill="#085041">EXECUTOR NODE POOL</text>
<text x="522" y="72" class="tn" fill="#0F6E56">tainted spark-role=executor:NoSchedule</text>
<text x="522" y="84" class="tn" fill="#0F6E56">label workload=spark-executor · min 0 / max 10</text>
<g>
<rect x="524" y="96" width="168" height="40" rx="5" fill="#fff" stroke="#0b7a63" stroke-width=".9"/><text x="608" y="112" class="ts" text-anchor="middle" fill="#085041">executor pod</text><text x="608" y="126" class="tn" text-anchor="middle" fill="#5c6b66">2 cores / 2g</text>
<rect x="524" y="142" width="168" height="40" rx="5" fill="#fff" stroke="#0b7a63" stroke-width=".9"/><text x="608" y="158" class="ts" text-anchor="middle" fill="#085041">executor pod</text><text x="608" y="172" class="tn" text-anchor="middle" fill="#5c6b66">2 cores / 2g</text>
<rect x="524" y="188" width="168" height="40" rx="5" fill="#fff" stroke="#0b7a63" stroke-width=".9" stroke-dasharray="3 2"/><text x="608" y="204" class="ts" text-anchor="middle" fill="#5c6b66">executor pod …</text><text x="608" y="218" class="tn" text-anchor="middle" fill="#8a8f8c">up to 10 (dynamic alloc)</text>
</g>
<text x="522" y="246" class="tn" fill="#8a5a0b">dynamic allocation 0 → 10 · spread across nodes</text>
<!-- S3 -->
<rect x="524" y="298" width="168" height="46" rx="6" fill="#F7EFDD" stroke="#8a5a0b" stroke-width="1"/>
<text x="608" y="316" class="th" text-anchor="middle" fill="#8a5a0b">S3 warehouse (Iceberg)</text>
<text x="608" y="331" class="tn" text-anchor="middle" fill="#a06a10">vended prefix-scoped creds (§3.3)</text>
<line x1="608" y1="228" x2="608" y2="296" stroke="#8a8f8c" stroke-width="1" marker-end="url(#ar)"/>

<!-- API -> executor pool -->
<line x1="446" y1="291" x2="524" y2="200" stroke="#8a8f8c" stroke-width="1.2" marker-end="url(#ar)"/>
<text x="486" y="252" class="tn" fill="#5c6b66" text-anchor="middle">creates</text>

<text x="16" y="392" class="ts" fill="#16201e">One shared Connect driver serves many sessions; execution scales elastically on a <tspan font-weight="600">separate, tainted</tspan> node pool.</text>
<text x="16" y="410" class="ts" fill="#16201e">Scaling happens <tspan font-weight="600">behind</tspan> the governed mTLS door (:15009), never around it. The two pools keep the driver and its executors physically separated.</text>
</svg>
