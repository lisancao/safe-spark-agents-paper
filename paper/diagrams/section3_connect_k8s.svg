</defs>

<text x="16" y="17" class="lab" fill="#5F5E5A">CONNECT ON KUBERNETES: ONE GOVERNED mTLS DOOR, ELASTIC EXECUTORS ON A SEPARATE POOL BEHIND IT</text>

