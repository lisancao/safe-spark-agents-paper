<rect x="14" y="150" width="130" height="58" rx="6" fill="#F2F1FB" stroke="#3C3489" stroke-width="1"/>
<text x="79" y="174" class="th" text-anchor="middle" fill="#3C3489">Connect client</text>
<text x="79" y="190" class="tn" text-anchor="middle" fill="#5c5b8f">controller / agent</text>
<line x1="144" y1="179" x2="196" y2="179" stroke="#185FA5" stroke-width="1.6" marker-end="url(#ar)"/>
<text x="170" y="171" class="tn" fill="#185FA5" text-anchor="middle">mTLS</text>
<text x="170" y="196" class="mono" fill="#185FA5" text-anchor="middle">:15009</text>

<!-- SYSTEM node pool -->
