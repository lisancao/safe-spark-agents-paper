<svg width="100%" viewBox="0 0 680 300" role="img" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
<title>Credential custody: the credential's path never touches the agent</title>
<desc>The agent is untrusted and holds no credential; it only emits an inert spec and receives a structural pass/fail. On the governed side, the catalog vends a short-lived scoped credential, the custodian (Section 4 / Omnigent) holds and injects it per session, and the Connect server and executors use it to reach only this tenant's data. The credential never crosses the trust boundary to the agent.</desc>
<style>
  text{font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  .th{font-size:13px;font-weight:500}.ts{font-size:11px}
  .lab{font-size:11px;font-weight:600;fill:#5c6b66;letter-spacing:.03em}
  .arr{stroke:#93a29d;stroke-width:1.5;fill:none}
  .att rect{fill:#F1EFE8;stroke:#5F5E5A;stroke-width:.75}.att .th{fill:#2C2C2A}.att .ts{fill:#5F5E5A}
  .cat rect{fill:#E6F1FB;stroke:#185FA5;stroke-width:.75}.cat .th{fill:#0C447C}.cat .ts{fill:#185FA5}
  .cus rect{fill:#EEEDFE;stroke:#534AB7;stroke-width:.75}.cus .th{fill:#3C3489}.cus .ts{fill:#534AB7}
  .use rect{fill:#E1F5EE;stroke:#0F6E56;stroke-width:.75}.use .th{fill:#085041}.use .ts{fill:#0F6E56}
  .cred{fill:#F7EFDD;stroke:#8a5a0b;stroke-width:.75}.credt{font-size:10px;font-weight:600;fill:#8a5a0b}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<text x="40" y="18" class="lab" fill="#5F5E5A">UNTRUSTED</text>
<text x="300" y="18" class="lab" fill="#0F6E56">GOVERNED: the credential lives here and never crosses left</text>
<line x1="272" y1="28" x2="272" y2="288" stroke="#b9433a" stroke-width="1.25" stroke-dasharray="5 4"/>
<text x="266" y="150" class="lab" fill="#b9433a" text-anchor="middle" transform="rotate(-90 266 150)">§2 trust boundary</text>

<!-- agent (left) -->
<g class="att"><rect x="40" y="40" width="205" height="52" rx="6"/><text x="142" y="63" class="th" text-anchor="middle">AI agent (untrusted)</text><text x="142" y="80" class="ts" text-anchor="middle">holds no credential</text></g>
<text x="40" y="128" class="ts" fill="#5F5E5A">Its only exchange with the platform:</text>
<g class="att"><rect x="40" y="140" width="205" height="34" rx="6"/><text x="142" y="161" class="ts" text-anchor="middle">emits an inert spec + PR  →</text></g>
<g class="att"><rect x="40" y="182" width="205" height="34" rx="6"/><text x="142" y="203" class="ts" text-anchor="middle">←  receives a pass / fail</text></g>

<!-- governed credential flow (right, vertical) -->
<g class="cat"><rect x="300" y="40" width="340" height="46" rx="6"/><text x="470" y="61" class="th" text-anchor="middle">Governed catalog (Lakekeeper + OpenFGA)</text><text x="470" y="77" class="ts" text-anchor="middle">authorizes per principal, then vends a short-lived scoped credential</text></g>
<g class="cus"><rect x="300" y="114" width="340" height="46" rx="6"/><text x="470" y="135" class="th" text-anchor="middle">Custodian · §4 / Omnigent</text><text x="470" y="151" class="ts" text-anchor="middle">holds + rotates the vended credential, injects it per session</text></g>
<g class="use"><rect x="300" y="188" width="340" height="46" rx="6"/><text x="470" y="209" class="th" text-anchor="middle">Connect server → executors</text><text x="470" y="225" class="ts" text-anchor="middle">use the injected credential to reach only this tenant's data</text></g>
<g class="use"><rect x="300" y="256" width="340" height="30" rx="6"/><text x="470" y="275" class="th" text-anchor="middle">S3 · this tenant's prefix only</text></g>

<!-- credential tag traveling down the governed flow -->
<line x1="470" y1="86" x2="470" y2="114" class="arr" marker-end="url(#arrow)"/>
<line x1="470" y1="160" x2="470" y2="188" class="arr" marker-end="url(#arrow)"/>
<line x1="470" y1="234" x2="470" y2="256" class="arr" marker-end="url(#arrow)"/>
<g><rect class="cred" x="486" y="92" width="78" height="17" rx="8"/><text x="525" y="104" class="credt" text-anchor="middle">credential</text></g>
<g><rect class="cred" x="486" y="166" width="78" height="17" rx="8"/><text x="525" y="178" class="credt" text-anchor="middle">credential</text></g>
</svg>
