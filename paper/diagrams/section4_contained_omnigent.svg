<svg width="100%" viewBox="0 0 720 448" role="img" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
<title>Section 4: Omnigent contained as pods in the client's EKS, over the Section 3 platform</title>
<desc>A fully containerized Omnigent delivery layer runs as pods in the client's EKS cluster: an Omnigent server (control plane), a credential-free agent fleet (claude_code, codex, pi), and a custodian that holds the Connect PSK and per-tenant catalog tokens. The custodian is the fleet's only path to a catalog; it submits into the Section 3 governed platform (ingress gateway, per-tenant Connect servers, Lakekeeper authz and vend, S3). One IdP over OIDC governs both planes.</desc>
<style>
  text{font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  .th{font-size:12px;font-weight:500}.ts{font-size:9.5px}.tn{font-size:9px}
  .lab{font-size:10px;font-weight:600;letter-spacing:.03em}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<text x="18" y="16" class="lab" fill="#5F5E5A">SECTION 4 · OMNIGENT CONTAINED · the governed delivery layer as pods in the client's EKS, over §3</text>

<!-- Client IdP -->
<rect x="300" y="28" width="150" height="28" rx="5" fill="#F7EFDD" stroke="#8a5a0b" stroke-width=".8"/>
<text x="375" y="46" class="ts" text-anchor="middle" fill="#8a5a0b">Client IdP (OIDC)</text>
<line x1="360" y1="56" x2="120" y2="118" stroke="#8a5a0b" stroke-width=".8" stroke-dasharray="4 3"/>
<text x="196" y="92" class="tn" fill="#8a5a0b">OIDC authn</text>

<!-- Cluster boundary -->
<text x="18" y="70" class="lab" fill="#5F5E5A">CLIENT EKS CLUSTER · all containerized</text>
<rect x="10" y="74" width="700" height="292" rx="9" fill="none" stroke="#9aa3a0" stroke-width="1" stroke-dasharray="6 4"/>

<!-- Omnigent plane -->
<rect x="22" y="90" width="676" height="120" rx="6" fill="#F7F6FD" stroke="#534AB7" stroke-width="1"/>
<text x="34" y="107" class="lab" fill="#3C3489">§4  OMNIGENT DELIVERY  ·  ns: omnigent</text>

<rect x="36" y="120" width="150" height="62" rx="5" fill="#fff" stroke="#534AB7" stroke-width=".8"/>
<text x="111" y="142" class="th" text-anchor="middle" fill="#3C3489">Omnigent server</text>
<text x="111" y="158" class="tn" text-anchor="middle" fill="#5c6b66">control plane (container)</text>
<text x="111" y="172" class="tn" text-anchor="middle" fill="#5c6b66">hosts / sandbox runners</text>

<rect x="216" y="122" width="234" height="58" rx="5" fill="#F0EEFB" stroke="#534AB7" stroke-width=".4" stroke-dasharray="3 2"/>
<text x="333" y="118" class="tn" text-anchor="middle" fill="#3C3489">credential-free agent fleet</text>
<rect x="224" y="126" width="66" height="50" rx="4" fill="#fff" stroke="#534AB7" stroke-width=".6"/>
<text x="257" y="147" class="ts" text-anchor="middle" fill="#3C3489">claude_code</text>
<text x="257" y="161" class="tn" text-anchor="middle" fill="#5c6b66">Anthropic</text>
<rect x="300" y="126" width="66" height="50" rx="4" fill="#fff" stroke="#534AB7" stroke-width=".6"/>
<text x="333" y="147" class="ts" text-anchor="middle" fill="#3C3489">codex</text>
<text x="333" y="161" class="tn" text-anchor="middle" fill="#5c6b66">OpenAI</text>
<rect x="376" y="126" width="66" height="50" rx="4" fill="#fff" stroke="#534AB7" stroke-width=".6"/>
<text x="409" y="147" class="ts" text-anchor="middle" fill="#3C3489">pi</text>
<text x="409" y="161" class="tn" text-anchor="middle" fill="#5c6b66">gateway</text>

<rect x="566" y="120" width="126" height="62" rx="5" fill="#FDF3F2" stroke="#b9433a" stroke-width="1"/>
<text x="629" y="140" class="th" text-anchor="middle" fill="#b9433a">CUSTODIAN</text>
<text x="629" y="155" class="tn" text-anchor="middle" fill="#a2483f">holds PSK + tenant tokens</text>
<text x="629" y="169" class="tn" text-anchor="middle" fill="#a2483f">only path to a catalog</text>

<line x1="187" y1="151" x2="222" y2="151" stroke="#8a8f8c" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="450" y1="151" x2="564" y2="151" stroke="#8a8f8c" stroke-width="1" marker-end="url(#arrow)"/>
<text x="507" y="145" class="tn" text-anchor="middle" fill="#5c6b66">submit(customer, code)</text>

<!-- cross-plane: custodian into §3 -->
<line x1="629" y1="182" x2="629" y2="264" stroke="#b9433a" stroke-width="1.1" marker-end="url(#arrow)"/>
<text x="636" y="226" class="tn" fill="#b9433a">the only ingress into §3</text>

<!-- §3 plane -->
<rect x="22" y="236" width="676" height="120" rx="6" fill="#ECF5F1" stroke="#0b7a63" stroke-width="1"/>
<text x="34" y="253" class="lab" fill="#085041">§3  GOVERNED PLATFORM  ·  ns: spark  ·  per-tenant isolation</text>

<rect x="566" y="266" width="126" height="62" rx="5" fill="#fff" stroke="#0b7a63" stroke-width=".8"/>
<text x="629" y="287" class="th" text-anchor="middle" fill="#085041">Ingress gateway</text>
<text x="629" y="302" class="tn" text-anchor="middle" fill="#5c6b66">Envoy mTLS</text>
<text x="629" y="316" class="tn" text-anchor="middle" fill="#5c6b66">routes by principal</text>

<rect x="350" y="266" width="200" height="62" rx="5" fill="#fff" stroke="#0b7a63" stroke-width=".8"/>
<text x="450" y="287" class="ts" text-anchor="middle" fill="#085041">Per-tenant Connect servers</text>
<text x="450" y="302" class="tn" text-anchor="middle" fill="#5c6b66">tenant-a / -b / -c · token-injected</text>
<text x="450" y="316" class="tn" text-anchor="middle" fill="#5c6b66">disjoint executor pods</text>

<rect x="196" y="266" width="138" height="62" rx="5" fill="#fff" stroke="#0b7a63" stroke-width=".8"/>
<text x="265" y="287" class="th" text-anchor="middle" fill="#085041">Lakekeeper</text>
<text x="265" y="302" class="tn" text-anchor="middle" fill="#5c6b66">OpenFGA authz +</text>
<text x="265" y="316" class="tn" text-anchor="middle" fill="#5c6b66">prefix-scoped vend</text>

<rect x="36" y="266" width="144" height="62" rx="5" fill="#f0efec" stroke="#9aa3a0" stroke-width=".8"/>
<text x="108" y="287" class="th" text-anchor="middle" fill="#5F5E5A">S3 warehouse</text>
<text x="108" y="302" class="tn" text-anchor="middle" fill="#5c6b66">Iceberg tables</text>
<text x="108" y="316" class="tn" text-anchor="middle" fill="#5c6b66">per-tenant prefixes</text>

<line x1="566" y1="297" x2="552" y2="297" stroke="#8a8f8c" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="350" y1="297" x2="336" y2="297" stroke="#8a8f8c" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="196" y1="297" x2="182" y2="297" stroke="#8a8f8c" stroke-width="1" marker-end="url(#arrow)"/>
<text x="265" y="344" class="tn" text-anchor="middle" fill="#8a5a0b">OIDC: same issuer authorizes here (§3)</text>

<!-- captions -->
<text x="18" y="388" class="th" fill="#3C3489">Contained: server + custodian + the credential-free fleet all run as pods in the client's EKS. No laptop, no port-forward shim.</text>
<text x="18" y="404" class="ts" fill="#5c6b66">The custodian alone holds the Connect PSK and every per-tenant token; the claude_code / codex / pi agents hold zero credentials.</text>
<text x="18" y="418" class="ts" fill="#5c6b66">One IdP (OIDC) governs both planes: the same issuer authenticates Omnigent and authorizes Lakekeeper per-principal. §2 dev loop + §3 isolation unchanged underneath.</text>
<text x="18" y="434" class="tn" fill="#8a5a0b">Deploy: kubectl kustomize deploy/kubernetes/base | kubectl apply -f -  (server)  +  overlays/sandbox-runners (agents)  +  the §3 stack (S0-S7).</text>
</svg>
