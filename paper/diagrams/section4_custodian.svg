<svg width="100%" viewBox="0 0 680 330" role="img" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, sans-serif">
<title>Section 4 (S4.3): the Omnigent credential custodian at fleet scale</title>
<desc>A fleet of untrusted, credential-free agents submits inert specs to one Omnigent custodian and receives only pass or fail. The custodian holds and rotates every per-tenant credential, minting a fresh short-lived token per job and running the work over the Section 3 governed catalog and per-tenant storage. Credentials never cross the trust boundary back to the agents, and Section 3's per-tenant isolation is preserved under custody.</desc>
<style>
  text{font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  .th{font-size:12.5px;font-weight:500}.ts{font-size:10.5px}
  .lab{font-size:11px;font-weight:600;fill:#5c6b66;letter-spacing:.03em}
  .arr{stroke:#93a29d;stroke-width:1.5;fill:none}
  .att rect{fill:#F1EFE8;stroke:#5F5E5A;stroke-width:.75}.att .th{fill:#2C2C2A}.att .ts{fill:#5F5E5A}
  .cus rect{fill:#EEEDFE;stroke:#534AB7;stroke-width:.9}.cus .th{fill:#3C3489}.cus .ts{fill:#534AB7}
  .cat rect{fill:#E1F5EE;stroke:#0F6E56;stroke-width:.75}.cat .th{fill:#085041}.cat .ts{fill:#0F6E56}
  .cred{fill:#F7EFDD;stroke:#8a5a0b;stroke-width:.75}.credt{font-size:9.5px;font-weight:600;fill:#8a5a0b}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<text x="40" y="18" class="lab" fill="#5F5E5A">UNTRUSTED FLEET · no credential</text>
<text x="300" y="18" class="lab" fill="#3C3489">OMNIGENT CUSTODIAN: holds + rotates every credential</text>

<!-- trust boundary (the §2 boundary, at fleet scale) -->
<line x1="238" y1="30" x2="238" y2="205" stroke="#b9433a" stroke-width="1.25" stroke-dasharray="5 4"/>
<text x="232" y="118" class="lab" fill="#b9433a" text-anchor="middle" transform="rotate(-90 232 118)">§2 boundary</text>

<!-- fleet of agents -->
<g class="att"><rect x="40" y="40" width="180" height="34" rx="6"/><text x="130" y="55" class="th" text-anchor="middle">agent A1 · tenant A</text><text x="130" y="69" class="ts" text-anchor="middle">emits spec + PR</text></g>
<g class="att"><rect x="40" y="84" width="180" height="34" rx="6"/><text x="130" y="99" class="th" text-anchor="middle">agent B1 · tenant B</text><text x="130" y="113" class="ts" text-anchor="middle">emits spec + PR</text></g>
<g class="att"><rect x="40" y="128" width="180" height="34" rx="6"/><text x="130" y="143" class="th" text-anchor="middle">agent A2 · tenant A</text><text x="130" y="157" class="ts" text-anchor="middle">emits spec + PR</text></g>
<text x="130" y="182" class="ts" fill="#5F5E5A" text-anchor="middle">each receives only a pass / fail</text>

<!-- agents -> custodian -->
<line x1="220" y1="101" x2="300" y2="120" class="arr" marker-end="url(#arrow)"/>
<text x="246" y="104" class="ts" fill="#5c6b66">spec →</text>
<line x1="300" y1="150" x2="220" y2="150" class="arr" marker-end="url(#arrow)"/>
<text x="244" y="145" class="ts" fill="#5c6b66">← pass/fail</text>

<!-- custodian -->
<g class="cus"><rect x="300" y="60" width="180" height="120" rx="8"/>
  <text x="390" y="80" class="th" text-anchor="middle">Custodian</text>
  <text x="390" y="96" class="ts" text-anchor="middle">mints a fresh short-lived</text>
  <text x="390" y="109" class="ts" text-anchor="middle">token per job (rotation)</text>
  <rect x="316" y="120" width="148" height="48" rx="5" fill="#ffffff" stroke="#534AB7" stroke-width=".5" stroke-dasharray="3 2"/>
  <text x="390" y="134" class="ts" text-anchor="middle" fill="#3C3489">vault (never handed back):</text>
  <text x="390" y="149" class="credt" text-anchor="middle">credA#3  credB#2  credA#1 …</text>
  <text x="390" y="162" class="ts" text-anchor="middle" fill="#534AB7">held only here</text>
</g>

<!-- custodian -> catalog -->
<line x1="480" y1="120" x2="560" y2="120" class="arr" marker-end="url(#arrow)"/>
<g><rect class="cred" x="492" y="99" width="72" height="16" rx="8"/><text x="528" y="111" class="credt" text-anchor="middle">credential</text></g>
<text x="500" y="140" class="ts" fill="#5c6b66">mint + vend</text>
<text x="500" y="152" class="ts" fill="#5c6b66">per tenant</text>

<!-- catalog + storage -->
<g class="cat"><rect x="560" y="60" width="110" height="52" rx="6"/><text x="615" y="82" class="th" text-anchor="middle">§3 catalog</text><text x="615" y="97" class="ts" text-anchor="middle">per-principal authz</text></g>
<g class="cat"><rect x="560" y="126" width="110" height="52" rx="6"/><text x="615" y="148" class="th" text-anchor="middle">per-tenant</text><text x="615" y="163" class="ts" text-anchor="middle">storage (scoped)</text></g>
<line x1="615" y1="112" x2="615" y2="126" class="arr" marker-end="url(#arrow)"/>

<text x="40" y="228" class="th" fill="#3C3489">One custodian, N credential-free agents.</text>
<text x="40" y="246" class="ts" fill="#5c6b66">Demonstrated on the §3 catalog: 1 custodian governed 2 tenants, minted + rotated 3 short-lived credentials, agents held 0;</text>
<text x="40" y="260" class="ts" fill="#5c6b66">an agent's cross-tenant read was refused (PERMISSION_DENIED), so §3's per-tenant isolation holds under custody.</text>
<text x="40" y="278" class="ts" fill="#8a5a0b">Frontier: P6 scale-out (many tenants + node autoscaling) and rotation under live long-running jobs.</text>
</svg>
